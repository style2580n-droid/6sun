<script>
/* window.storage 폴리필 — 일반 웹(GitHub Pages 등)에서는 localStorage로 영구 저장 */
(function(){
  if (window.storage) return;
  function lsKey(k, shared){ return (shared?"shared:":"user:") + k; }
  window.storage = {
    async get(key, shared){
      const v = localStorage.getItem(lsKey(key, shared));
      if (v === null) return null;
      return { key, value: v, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem(lsKey(key, shared), value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem(lsKey(key, shared));
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const pfx = lsKey(prefix||"", shared);
      const keys = [];
      for (let i=0;i<localStorage.length;i++){
        const full = localStorage.key(i);
        if (full && full.startsWith(pfx)){
          keys.push(full.replace(shared?"shared:":"user:",""));
        }
      }
      return { keys, prefix, shared: !!shared };
    }
  };
})();
</script>

      const url = `https://raw.githubusercontent.com/${PIPELINE_REPO_OWNER}/${PIPELINE_REPO_NAME}/${PIPELINE_BRANCH}/reports/app_data_multileague.js?t=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        console.warn("[pipeline] app_data_multileague.js 없음:", res.status);
        return false;
      }
      const text = await res.text();
      // 파일 내용이 이미 "window.PIPELINE_DATA_LALIGA = {...};" 형태의 실행 가능한
      // JS 문이라, EPL 앱처럼 구조분해할 필요 없이 그대로 실행만 하면 window에 붙는다.
      new Function(text)();
      return true;
    } catch (e) {
      console.warn("[pipeline] fetch 실패:", e);
      return false;
    }
  })();
  return _pipelineFetchPromise;
}

let SQUADS = {};     // { 팀명: [선수명, ...] } — app_export_multileague.py의 squads 필드

// ── 부상자/월드컵 피로도 (2026-07-15 추가, 데이터는 아직 파이프라인에서 안 옴 — 틀만 미리 준비) ──
// TEAM_INJURIES: EPL 앱의 SQUADS[team].keyOut/injured와 동일한 필드명·의미.
//   { 팀명: { keyOut: [선수명,...], injured: [선수명,...] } }
//   keyOut = 핵심 결장(주전급 장기이탈), injured = 로테이션 부상(경미)
// TEAM_FATIGUE: 월드컵 여독 — { 팀명: { fatigueScore: 0~1 } }. EPL 앱에도 fatigue 필드가
//   ELO 객체 안에 있지만 실제로 어디서도 안 쓰이고 있었음(빈 자리로만 존재) — 여기서는
//   실제로 computeLambdas에 연결해뒀다. 값이 없으면(신규 데이터 도착 전) 항상 무효과.
let TEAM_INJURIES = {};
let TEAM_FATIGUE = {};

// injuryLambdaAdjust: EPL 앱과 동일 공식 — keyOut 1명당 -6%, injured 1명당 -2%, 하한 -28%
function injuryLambdaAdjust(home, away) {
  function penalty(team) {
    const inj = TEAM_INJURIES[team];
    if (!inj) return 1;
    const keyOut = Array.isArray(inj.keyOut) ? inj.keyOut.length : 0;
    const injured = Array.isArray(inj.injured) ? inj.injured.length : 0;
    return Math.max(0.72, 1 - keyOut * 0.06 - injured * 0.02);
  }
  return { homeFactor: penalty(home), awayFactor: penalty(away) };
}

// fatigueLambdaAdjust: 월드컵 결승까지 많이 뛴 선수가 있는 팀은 시즌 초반 소폭 페널티.
// fatigueScore는 0(영향없음)~1(최대 피로) 범위로 파이프라인이 계산해서 줄 예정 — 최대 -10%.
function fatigueLambdaAdjust(team) {
  const f = TEAM_FATIGUE[team];
  const score = f && Number.isFinite(f.fatigueScore) ? Math.max(0, Math.min(1, f.fatigueScore)) : 0;
  return Math.max(0.90, 1 - score * 0.10);
}

let TEAM_XG = {};    // { 팀명: { xG, xGA } } — collect_xg_bsd.py의 teamXg 필드
                      // (24-25/25-26 시즌 평균, 26-27 신규 승격팀은 항목이 없을 수 있음 — 정상)

// ── 선수 능력치 기준선 (A단계, 2026-07-22 연결) ──────────────────────────────
// PLAYER_BASELINE: player_baseline.json(update_player_baseline()) 구조 그대로.
//   { "이름|국가": { name_kr, club_en, league, position, per90:{scoring,creating,defending}, source, league_apps, ... } }
// source는 두 가지: "wc2026"(월드컵 기록으로 채운 시즌 초 임시값) / "league"(실제 26-27 리그 경기로
// 갱신된 값, league_apps>=5일 때 자동 전환 — 인수인계 7번 항목).
//
// ⚠️ 지금 시점(개막 전) 매칭 가능한 선수는 club_en이 채워진 314명 중 6개 리그 소속만이고
// (팀당 평균 2명 안팎), 그마저 전부 source=wc2026(월드컵 기록)이라 팀 단위로 평균 내기엔
// 표본이 너무 적고 왜곡 위험이 크다 — "추측 금지" 원칙에 따라 이 값들로는 예측을 흔들지 않는다.
// 그래서 playerLambdaAdjust는 source==="league"(=실제 시즌 데이터로 갱신된 선수)만 세고,
// 팀당 최소 표본(PLAYER_MIN_SAMPLE)을 못 채우면 항상 무효과(factor=1)를 반환한다.
// 개막 후 몇 주 지나 league_apps>=5인 선수가 팀당 쌓이면 자동으로 활성화된다(별도 배포 불필요).
let PLAYER_BASELINE = {};
const PLAYER_MIN_SAMPLE = 4; // 팀당 이 명수 이상 source=league 선수가 있어야 반영 시작

// teamMatchedLeaguePlayers: club_en 기준으로 이 팀 소속이면서 source=league인 선수만 추출.
function teamMatchedLeaguePlayers(leagueKey, teamName) {
  const clubEn = (ENGLISH_NAME[leagueKey] && ENGLISH_NAME[leagueKey][teamName]) || null;
  if (!clubEn) return [];
  return Object.values(PLAYER_BASELINE).filter(p =>
    p && p.club_en === clubEn && p.source === "league" &&
    p.per90 && Number.isFinite(p.per90.scoring) && Number.isFinite(p.per90.creating));
}

// leagueAvgPer90: 매칭된(source=league) 선수 전체 기준 리그 평균 scoring+creating per90.
// 팀 지수를 이 평균 대비 상대값으로 계산해야 리그마다 득점 수준이 달라도 공정하게 비교된다.
function leagueAvgPer90(leagueKey) {
  const teams = LEAGUES[leagueKey].teams;
  let sum = 0, n = 0;
  teams.forEach(t => {
    teamMatchedLeaguePlayers(leagueKey, t).forEach(p => {
      sum += p.per90.scoring + p.per90.creating;
      n++;
    });
  });
  return n > 0 ? sum / n : null;
}

// playerLambdaAdjust: 팀별 매칭 선수의 (scoring+creating) per90 평균이 리그 평균보다 높으면
// 공격 λ를 소폭 상향, 낮으면 소폭 하향. 표본 부족 시 항상 1(무효과) — xG/부상/피로도와 동일한
// "안전한 폴백" 패턴. 효과는 최대 ±8%로 제한(팀 단위 ELO/xG보다 신뢰도가 낮은 보조 신호이므로).
function playerLambdaAdjust(leagueKey, teamName) {
  const matched = teamMatchedLeaguePlayers(leagueKey, teamName);
  if (matched.length < PLAYER_MIN_SAMPLE) return { factor: 1, applied: false, matched: matched.length };
  const avgLeague = leagueAvgPer90(leagueKey);
  if (!Number.isFinite(avgLeague) || avgLeague <= 0) return { factor: 1, applied: false, matched: matched.length };
  const teamAvg = matched.reduce((s, p) => s + p.per90.scoring + p.per90.creating, 0) / matched.length;
  const rel = (teamAvg - avgLeague) / avgLeague; // -1 ~ +수 (통상 -0.5~+0.5권)
  const factor = Math.max(0.92, Math.min(1.08, 1 + rel * 0.16));
  return { factor, applied: true, matched: matched.length };
}

async function loadPipelineData(leagueKey) {
  try {
    await fetchPipelineDataMultileague();
    const globalKey = `PIPELINE_DATA_${leagueKey.toUpperCase()}`;
    const data = (typeof window !== "undefined") ? window[globalKey] : null;
    if (!data) return { scheduleLoaded:false, logosLoaded:false, squadsLoaded:false, xgLoaded:false, injuriesLoaded:false, fatigueLoaded:false, transfersLoaded:false, h2hLoaded:false, leaderboardLoaded:false, playerBaselineLoaded:false };
    let scheduleLoaded = false, logosLoaded = false, squadsLoaded = false, xgLoaded = false, injuriesLoaded = false, fatigueLoaded = false, transfersLoaded = false, h2hLoaded = false, leaderboardLoaded = false, playerBaselineLoaded = false;
    if (Array.isArray(data.schedule) && data.schedule.length) {
      SCHEDULE = data.schedule;
      scheduleLoaded = true;
    }
    if (data.logos && typeof data.logos === "object") {
      Object.assign(CLUB_LOGOS, data.logos);
      logosLoaded = true;
    }
    if (data.elo && typeof data.elo === "object") {
      Object.assign(ELO, data.elo);
    }
    if (data.squads && typeof data.squads === "object" && Object.keys(data.squads).length) {
      SQUADS = data.squads;
      squadsLoaded = true;
    }
    if (data.teamXg && typeof data.teamXg === "object" && Object.keys(data.teamXg).length) {
      TEAM_XG = data.teamXg;
      xgLoaded = true;
    }
    // 부상: { 팀명: { keyOut:[...], injured:[...] } } — 아직 파이프라인에 없어도 안전하게 통과
    if (data.injuries && typeof data.injuries === "object" && Object.keys(data.injuries).length) {
      TEAM_INJURIES = data.injuries;
      injuriesLoaded = true;
    }
    // 월드컵 여독: { 팀명: { fatigueScore: 0~1 } } — "조만간" 올라올 예정, 그 전까진 무효과
    if (data.fatigue && typeof data.fatigue === "object" && Object.keys(data.fatigue).length) {
      TEAM_FATIGUE = data.fatigue;
      fatigueLoaded = true;
    }
    // 이적(영입/이탈): { 팀명: { in:[...], out:[...] } } — 2026-07-16 파이프라인에 연결됨
    if (data.transfers && typeof data.transfers === "object" && Object.keys(data.transfers).length) {
      TRANSFERS = data.transfers;
      transfersLoaded = true;
    }
    // H2H: { "팀A|||팀B": [...] } — 2026-07-16 파이프라인에 연결됨 (EPL 앱과 동일 구조)
    if (data.h2h && typeof data.h2h === "object" && Object.keys(data.h2h).length) {
      H2H = data.h2h;
      h2hLoaded = true;
    }
    // LEADERBOARD: { scorers:{}, assists:{} } — 2026-07-18 신규.
    // 8월 개막 전엔 scorers/assists가 둘 다 빈 객체로 오는 게 정상이라 그 경우엔
    // loaded를 true로 안 올린다(=화면에 "데이터 없음" 안내가 뜨게 둠).
    if (data.leaderboard && typeof data.leaderboard === "object" &&
        ((data.leaderboard.scorers && Object.keys(data.leaderboard.scorers).length) ||
         (data.leaderboard.assists && Object.keys(data.leaderboard.assists).length))) {
      LEADERBOARD = data.leaderboard;
      leaderboardLoaded = true;
    }
    // 선수 능력치 기준선(A단계, 2026-07-22): { "이름|국가": {club_en, position, per90, source, ...} }
    // update_player_baseline()이 출력하는 player_baseline.json의 players 필드를 그대로 받는다.
    // 비어있거나 필드가 없으면(파이프라인이 아직 안 붙였으면) 조용히 무효과로 통과.
    if (data.playerBaseline && typeof data.playerBaseline === "object" && Object.keys(data.playerBaseline).length) {
      PLAYER_BASELINE = data.playerBaseline;
      playerBaselineLoaded = true;
    }
    return { scheduleLoaded, logosLoaded, squadsLoaded, xgLoaded, injuriesLoaded, fatigueLoaded, transfersLoaded, h2hLoaded, leaderboardLoaded, playerBaselineLoaded };
  } catch (e) {
    return { scheduleLoaded:false, logosLoaded:false, squadsLoaded:false, xgLoaded:false, injuriesLoaded:false, fatigueLoaded:false, transfersLoaded:false, h2hLoaded:false, leaderboardLoaded:false, playerBaselineLoaded:false };
  }
}

// getKickoffDate: SCHEDULE의 date(YYYY-MM-DD)+time(HH:MM, 파이프라인이 KST로 변환해서 줌)을
// 실제 Date 객체로 변환. "+09:00"을 명시해서 만들기 때문에, 이 앱을 보는 사람이 어느
// 시간대에 있든(내부적으로 Date는 UTC 절대시각을 저장하므로) 정확하게 비교된다.
function getKickoffDate(g) {
  if (!g || !g.date) return null;
  const time = g.time || "00:00";
  const dt = new Date(`${g.date}T${time}:00+09:00`);
  return isNaN(dt.getTime()) ? null : dt;
}

function normTeamStr(s) {
  return String(s || "").toLowerCase().normalize("NFKD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
}
function isSameClubName(leagueKey, koName, foreignName) {
  if (!foreignName) return false;
  const target = normTeamStr(foreignName);
  if (!target) return false;
  const en = ENGLISH_NAME[leagueKey]?.[koName];
  const alias = normTeamStr(en || koName);
  if (!alias) return false;
  return alias === target || target.includes(alias) || alias.includes(target);
}

function impliedProbFromOdds(odds) {
  if (typeof odds !== "number" || !isFinite(odds) || odds <= 1) return null;
  return 1 / odds;
}
function devigOdds(oddsObj) {
  if (!oddsObj) return null;
  const ih = impliedProbFromOdds(oddsObj.home), id = impliedProbFromOdds(oddsObj.draw), ia = impliedProbFromOdds(oddsObj.away);
  if (ih == null || id == null || ia == null) return null;
  const sum = ih + id + ia;
  if (!Number.isFinite(sum) || sum <= 0) return null;
  return { home: ih / sum, draw: id / sum, away: ia / sum }; // 마진 제거된 fair 확률
}
function computeEV(modelProb, fairOdds) {
  if (typeof modelProb !== "number" || !fairOdds || fairOdds <= 1) return null;
  return (modelProb * fairOdds) - 1; // 양수면 모델이 시장보다 이 결과를 더 유력하게 봄
}

const ODDS_API_IO_KEY = "afb988f21e224372190ac852df6d2430c86be07b7a3bd8088f2a42950b648db0"; // EPL 앱과 동일한 실제 키로 교체 (2026-07-16)

async function fetchMatchOdds(leagueKey, home, away) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 6000);
    const evUrl = `https://api.odds-api.io/v3/events?apiKey=${ODDS_API_IO_KEY}&sport=football&status=pending`;
    const res = await fetch(evUrl, { signal: controller.signal }).catch(() => null);
    clearTimeout(timer);
    if (!res || !res.ok) return null;
    const events = await res.json().catch(() => null);
    const list = Array.isArray(events) ? events : (Array.isArray(events?.data) ? events.data : null);
    if (!Array.isArray(list)) return null;

    const direct = list.find(ev => isSameClubName(leagueKey, home, ev.home) && isSameClubName(leagueKey, away, ev.away));
    const swapped = direct ? null : list.find(ev => isSameClubName(leagueKey, home, ev.away) && isSameClubName(leagueKey, away, ev.home));
    const match = direct || swapped;
    if (!match) return null;

    const oddsUrl = `https://api.odds-api.io/v3/odds?apiKey=${ODDS_API_IO_KEY}&eventId=${match.id}`;
    const oddsRes = await fetch(oddsUrl).catch(() => null);
    if (!oddsRes || !oddsRes.ok) return null;
    const oddsData = await oddsRes.json().catch(() => null);
    const bk = oddsData?.bookmakers?.[0] || oddsData?.data?.bookmakers?.[0];
    const markets = bk?.markets || bk?.odds || [];
    const h2h = Array.isArray(markets) ? markets.find(m => m.key === "h2h" || m.name === "1X2") : null;
    if (!h2h || !Array.isArray(h2h.outcomes)) return null;
    const oh = h2h.outcomes.find(o => isSameClubName(leagueKey, home, o.name))?.price;
    const od = h2h.outcomes.find(o => /^draw$/i.test(o.name || ""))?.price;
    const oa = h2h.outcomes.find(o => isSameClubName(leagueKey, away, o.name))?.price;
    if (!oh || !od || !oa) return null;
    return { home: oh, draw: od, away: oa, source: "odds-api.io" };
  } catch (e) {
    return null;
  }
}

// ============================================================ 예측 엔진 v2 (EPL 앱에서 검증된 순수 함수 이식)
// EPL 앱의 expScore/calcDrawProb/poissonRandom/computeOverUnder/computeMarketStats는
// 다른 데이터(xG·부상·ML모델 등)에 의존하지 않는 순수 함수라 100% 안전하게 그대로 이식했다.
// (Node로 극단적 케이스까지 별도 수치 검증 완료: 확률 합 항상 1, 음수/NaN 없음)
//
// 아직 이식 안 한 것 (데이터가 없어서 이식하면 오작동/무의미한 값이 나오는 부분):
//  - randomForestWinProb(ML 앙상블) — EPL 데이터로 학습된 모델, 다른 리그에 안 맞음
//  - injuryLambdaAdjust/formLambdaAdjust — 실제 부상자/최근결과 데이터 필요
//  - psxgLambdaAdjust/setPieceLambdaAdjust/starPlayerLambdaBoost — 선수 단위 세부스탯 필요
//  - isRivalry — 리그별 라이벌 관계 데이터 필요 (현재 전부 false)
//  - calibrateProbTriple — EPL 실제 결과로 튜닝된 곡선, 다른 리그엔 안 맞음
function expScore(ra, rb) {
  return 1 / (1 + Math.pow(10, (rb - ra) / 400));
}
function calcDrawProb(eloDiff) {
  const base = 0.27;
  const closeness = Math.max(0, 1 - Math.abs(eloDiff) / 500);
  return Math.min(0.34, Math.max(0.16, base + closeness * 0.07));
}
function poissonRandom(lambda) {
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function computeOverUnder(scoreCounts, totalSims) {
  const lines = [2.5, 3.5];
  const result = {};
  for (const line of lines) {
    let over = 0;
    for (const [score, count] of Object.entries(scoreCounts)) {
      const [h, a] = score.split("-").map(Number);
      if ((h + a) > line) over += count;
    }
    result[line] = { over: over / totalSims, under: 1 - over / totalSims };
  }
  return result;
}

function computeMarketStats(scoreCounts, totalSims) {
  let bttsYes = 0, homeCS = 0, awayCS = 0;
  const exactDist = Object.entries(scoreCounts)
    .map(([score, count]) => ({ score, prob: count / totalSims }))
    .sort((a, b) => b.prob - a.prob);
  for (const [score, count] of Object.entries(scoreCounts)) {
    const [h, a] = score.split("-").map(Number);
    if (h >= 1 && a >= 1) bttsYes += count;
    if (a === 0) homeCS += count;
    if (h === 0) awayCS += count;
  }
  const p = (x) => x / totalSims;
  return {
    btts: { yes: p(bttsYes), no: 1 - p(bttsYes) },
    cleanSheet: { home: p(homeCS), away: p(awayCS) },
    exactDist: exactDist.slice(0, 5),
  };
}

// 실제로 잘 알려진 더비만 넣었고, 애매하거나 이번 시즌 리그에 상대팀이 없는 조합은 뺐다.

    ["밀월","웨스트햄 유나이티드"],                 // 오랜 라이벌

function isRivalry(leagueKey, a, b) {
  const list = RIVALRIES[leagueKey];
  if (!list) return false;
  return list.some(([x, y]) => (x === a && y === b) || (x === b && y === a));
}

// 리그별 실제 2025-26 시즌 경기당 평균 득점 (soccerstats.com / sportstats365.com 확인)
// 라리가·분데스리가는 홈/원정 분리 데이터까지 실측(soccerstats.com). 나머지 4개 리그는
// 홈/원정 분리 데이터를 못 구해서, 확인된 두 리그의 평균 홈 득점 비중(56.7%)을 적용한 추정치.
const LEAGUE_LAMBDA = {
  laliga:       { home: 1.57, away: 1.11 }, // 실측: soccerstats.com 2025-26
  bundesliga:   { home: 1.78, away: 1.46 }, // 실측: soccerstats.com 2025-26
  seriea:       { home: 1.38, away: 1.05 }, // 추정 (총 2.43골/경기, sportstats365)
  ligue1:       { home: 1.61, away: 1.23 }, // 추정 (총 2.83골/경기, sportstats365)
  eredivisie:   { home: 1.80, away: 1.38 }, // 추정 (총 3.18골/경기, sportstats365)
  championship: { home: 1.48, away: 1.13 }, // 추정 (총 2.61골/경기, sportstats365)
  // 2026-07-24 추가: 실측 footystats.org (2026 시즌 진행 중 데이터 기준)
  mls:          { home: 1.91, away: 1.38 },
  eliteserien:  { home: 1.85, away: 1.13 },
};

// computeLambdas: Elo+리그평균+xG블렌딩+라이벌보정으로 홈/원정 득점 기댓값(λ)을 계산.
// predictMatchV2(개별 경기 예측)와 simulateSeason(시즌 전체 시뮬레이션)이 동일 로직을 공유—
// 두 군데서 따로 구현하면 나중에 한쪽만 고치고 다른 쪽을 안 고치는 실수가 생기기 쉬워서 분리함.
// ML 앙상블 (2026-07-16 착수) — train_ml_ensemble.py가 EPL+6개 리그 통합으로
// 학습한 로지스틱 회귀 계수를 그대로 JS에서 재현한다(다항 로지스틱=소프트맥스).
// window.PIPELINE_ML_ENSEMBLE이 없으면(학습 표본 부족으로 스킵됐거나 아직
// 파이프라인 미실행) null을 반환 — predictMatchV2가 이 경우 ML 블렌딩을
// 건너뛰고 기존 Elo+몬테카를로 예측만 쓴다(항상 안전한 폴백).
function mlXgFeature(homeName, awayName) {
  const h = TEAM_XG[homeName], a = TEAM_XG[awayName];
  if (h && a && Number.isFinite(h.xG) && Number.isFinite(h.xGA) &&
      Number.isFinite(a.xG) && Number.isFinite(a.xGA)) {
    return { xgDiff: (h.xG - a.xGA) - (a.xG - h.xGA), hasXg: 1 };
  }
  return { xgDiff: 0, hasXg: 0 };
}

function mlEnsembleProbs(eloDiff, xgDiff, hasXg) {
  const m = (typeof window !== "undefined") ? window.PIPELINE_ML_ENSEMBLE : null;
  if (!m || !Array.isArray(m.coef) || !Array.isArray(m.intercept) || !Array.isArray(m.classes)) return null;
  const feats = [eloDiff, xgDiff, hasXg];
  const scores = m.classes.map((_, ci) => {
    const row = m.coef[ci] || [];
    let s = m.intercept[ci] || 0;
    for (let i = 0; i < feats.length; i++) s += (row[i] || 0) * feats[i];
    return s;
  });
  const maxS = Math.max(...scores);
  const exps = scores.map(s => Math.exp(s - maxS));
  const sumExp = exps.reduce((a, b) => a + b, 0) || 1;
  const probs = exps.map(e => e / sumExp);
  const out = { H: 0, D: 0, A: 0 };
  m.classes.forEach((c, i) => { out[c] = probs[i]; });
  return out;
}

function computeLambdas(leagueKey, homeName, awayName) {
  const homeElo = (ELO[homeName] ?? 1500) + HOME_ADV;
  const awayElo = (ELO[awayName] ?? 1500);
  const eloDiff = homeElo - awayElo;
  const eloLambdaFactor = Math.max(-0.35, Math.min(0.35, eloDiff / 200 * 0.18));
  const lgBase = LEAGUE_LAMBDA[leagueKey] || LEAGUE_LAMBDA.laliga;
  let lambdaHome = Math.max(0.15, lgBase.home * (1 + eloLambdaFactor));
  let lambdaAway = Math.max(0.15, lgBase.away * (1 - eloLambdaFactor));

  // xG 블렌딩 — TEAM_XG는 24-25/25-26 시즌 평균 xG(공격)/xGA(수비)다. 26-27 신규
  // 승격팀은 상위리그 xG 기록 자체가 없어서 TEAM_XG에 항목이 없을 수 있다 — 그 경우
  // 이 블록을 건너뛰고 기존 ELO 전용 람다를 그대로 쓴다(항상 안전한 폴백 유지).
  const homeXg = TEAM_XG[homeName], awayXg = TEAM_XG[awayName];
  let xgBlended = false;
  if (homeXg && awayXg &&
      Number.isFinite(homeXg.xG) && Number.isFinite(homeXg.xGA) &&
      Number.isFinite(awayXg.xG) && Number.isFinite(awayXg.xGA)) {
    const xgLambdaHome = Math.max(0.15, (homeXg.xG + awayXg.xGA) / 2);
    const xgLambdaAway = Math.max(0.15, (awayXg.xG + homeXg.xGA) / 2);
    const XG_WEIGHT = 0.3;
    lambdaHome = lambdaHome * (1 - XG_WEIGHT) + xgLambdaHome * XG_WEIGHT;
    lambdaAway = lambdaAway * (1 - XG_WEIGHT) + xgLambdaAway * XG_WEIGHT;
    xgBlended = true;
  }

  // 더비/라이벌 매치: λ를 평균 쪽으로 8% 수렴시켜 접전 스코어 유도 (EPL 앱과 동일 공식)
  const rivalry = isRivalry(leagueKey, homeName, awayName);
  if (rivalry) {
    const mid = (lambdaHome + lambdaAway) / 2;
    lambdaHome = lambdaHome * 0.92 + mid * 0.08;
    lambdaAway = lambdaAway * 0.92 + mid * 0.08;
  }

  // 부상자 보정 (TEAM_INJURIES 비어있으면 factor=1, 즉 무효과)
  const inj = injuryLambdaAdjust(homeName, awayName);
  lambdaHome = Math.max(0.15, lambdaHome * inj.homeFactor);
  lambdaAway = Math.max(0.15, lambdaAway * inj.awayFactor);

  // 월드컵 여독 보정 (TEAM_FATIGUE 비어있으면 factor=1, 즉 무효과)
  lambdaHome = Math.max(0.15, lambdaHome * fatigueLambdaAdjust(homeName));
  lambdaAway = Math.max(0.15, lambdaAway * fatigueLambdaAdjust(awayName));

  // 선수 능력치 기준선 보정 (A단계) — 팀당 source=league 매칭 선수가 PLAYER_MIN_SAMPLE
  // 미만이면 항상 factor=1(무효과). 개막 초반엔 거의 항상 이 상태가 정상이다.
  const homePlayer = playerLambdaAdjust(leagueKey, homeName);
  const awayPlayer = playerLambdaAdjust(leagueKey, awayName);
  lambdaHome = Math.max(0.15, lambdaHome * homePlayer.factor);
  lambdaAway = Math.max(0.15, lambdaAway * awayPlayer.factor);

  return { lambdaHome, lambdaAway, eloDiff, xgBlended, rivalry,
    injuryApplied: inj.homeFactor < 1 || inj.awayFactor < 1,
    fatigueApplied: (TEAM_FATIGUE[homeName]?.fatigueScore > 0) || (TEAM_FATIGUE[awayName]?.fatigueScore > 0),
    playerBaselineApplied: homePlayer.applied || awayPlayer.applied };
}


function predictMatchV2(leagueKey, homeName, awayName, sims = 100000) {
  const homeElo = (ELO[homeName] ?? 1500) + HOME_ADV;
  const awayElo = (ELO[awayName] ?? 1500);
  const eloDiff = homeElo - awayElo;

  const winProbRaw = expScore(homeElo, awayElo);
  const drawProbRaw = calcDrawProb(eloDiff);
  let homeWinProb = winProbRaw * (1 - drawProbRaw);
  let awayWinProb = (1 - winProbRaw) * (1 - drawProbRaw);
  let drawProb = drawProbRaw;

  const { lambdaHome, lambdaAway, xgBlended, rivalry, injuryApplied, fatigueApplied, playerBaselineApplied } = computeLambdas(leagueKey, homeName, awayName);

  // 더비/라이벌 매치: 전력차 완화 + 무승부 확률 상승(EPL 앱과 동일 공식, λ 수렴은 computeLambdas에서 이미 처리됨)
  if (rivalry) {
    const favComp = 0.90; // 승패 확률을 10% 무승부 쪽으로 압축
    homeWinProb *= favComp;
    awayWinProb *= favComp;
    drawProb = Math.max(0.02, 1 - homeWinProb - awayWinProb);
  }

  const safeSims = Number.isFinite(sims) && sims > 0 ? Math.floor(sims) : 100000;
  let hw = 0, dr = 0, aw = 0;
  const scoreCounts = {};
  for (let i = 0; i < safeSims; i++) {
    const hg = poissonRandom(lambdaHome);
    const ag = poissonRandom(lambdaAway);
    if (hg > ag) hw++; else if (hg < ag) aw++; else dr++;
    const key = `${hg}-${ag}`;
    scoreCounts[key] = (scoreCounts[key] || 0) + 1;
  }
  const mcHome = hw / safeSims, mcDraw = dr / safeSims, mcAway = aw / safeSims;
  let finalHome = (homeWinProb + mcHome) / 2;
  let finalDraw = (drawProb + mcDraw) / 2;
  let finalAway = (awayWinProb + mcAway) / 2;
  const total = finalHome + finalDraw + finalAway;
  finalHome /= total; finalDraw /= total; finalAway /= total;

  // ML 앙상블 블렌딩 (2026-07-16) — Elo+몬테카를로 결과에 20% 가중치로 섞는다.
  // xG 블렌딩(30%)보다 가중치를 낮게 잡은 이유: xG는 실제 슈팅 데이터 기반인
  // 반면 ML은 아직 학습 표본이 적을 26-27 시즌 초반 데이터로 만들어졌을
  // 가능성이 높아 과신하지 않는 게 안전하다.
  const { xgDiff: mlXgDiff, hasXg: mlHasXg } = mlXgFeature(homeName, awayName);
  const mlProbs = mlEnsembleProbs(eloDiff, mlXgDiff, mlHasXg);
  let mlApplied = false;
  if (mlProbs) {
    const ML_WEIGHT = 0.2;
    finalHome = finalHome * (1 - ML_WEIGHT) + mlProbs.H * ML_WEIGHT;
    finalDraw = finalDraw * (1 - ML_WEIGHT) + mlProbs.D * ML_WEIGHT;
    finalAway = finalAway * (1 - ML_WEIGHT) + mlProbs.A * ML_WEIGHT;
    const total2 = finalHome + finalDraw + finalAway;
    finalHome /= total2; finalDraw /= total2; finalAway /= total2;
    mlApplied = true;
  }

  const topScores = Object.entries(scoreCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5)
    .map(([score, count]) => ({ score, prob: count / safeSims }));

  return {
    home: homeName, away: awayName,
    homeWinProb: finalHome, drawProb: finalDraw, awayWinProb: finalAway,
    eloOnly: { homeWinProb, drawProb, awayWinProb },
    monteCarlo: { homeWinProb: mcHome, drawProb: mcDraw, awayWinProb: mcAway },
    lambdaHome, lambdaAway, eloDiff,
    xgBlended,  // true면 이 경기는 실제 xG 데이터가 반영된 예측 (2026-07-15 추가)
    rivalry,    // true면 더비/라이벌 매치 보정이 적용된 예측
    injuryApplied,  // true면 부상자 데이터가 반영된 예측 (데이터 도착 전엔 항상 false)
    fatigueApplied, // true면 월드컵 여독 데이터가 반영된 예측 (데이터 도착 전엔 항상 false)
    playerBaselineApplied, // true면 선수 능력치 기준선(A단계)이 반영된 예측 (개막 후 팀당 표본이 쌓이기 전엔 항상 false)
    mlApplied,      // true면 ML 앙상블이 반영된 예측 (학습 표본 부족 시 항상 false)
    topScores,
    overUnder: computeOverUnder(scoreCounts, safeSims),
    marketStats: computeMarketStats(scoreCounts, safeSims),
    sims: safeSims,
  };
}

// 리그별 강등권 크기 (근사치 — 리그앙/에레디비시/챔피언십처럼 플레이오프가 얽힌 경우도
// 있어서 정확한 승강 규정과 100% 일치하진 않음. "하위권 위험도" 참고용으로만 표시)
const RELEGATION_ZONE = {
  laliga: 3, bundesliga: 2, seriea: 3, ligue1: 2, eredivisie: 2, championship: 3,
  // 2026-07-24 추가: MLS는 강등제 자체가 없음(컨퍼런스+플레이오프 구조) → 0으로
  // 명시(없으면 ?? 3 기본값이 적용돼 잘못된 강등권을 계산하게 됨). 엘리테세리엔은
  // 실측(위키피디아 2026 시즌 문서) 2팀 강등.
  mls: 0, eliteserien: 2,
};

// simulateSeason: 실제 SCHEDULE(전체 시즌 일정)을 몬테카를로로 N번 통째로 돌려서
// 팀별 우승 확률·강등권 확률을 추정. 개별 경기 예측(predictMatchV2)과 같은 λ 계산
// (computeLambdas)을 공유하기 때문에 결과가 서로 어긋나지 않는다.
// SCHEDULE에 없는 팀명이 fixture에 섞여 있으면(파이프라인 데이터 오류 대비) 그 경기는
// 조용히 건너뛴다 — 시즌 시뮬레이션 전체가 깨지는 것보다 안전.
// 2026-07-24 수정: fixture에 homeGoals/awayGoals(실제 치른 경기, computeStandingsTable과
// 동일 판별 기준)가 있으면 그 실제 스코어를 그대로 승점에 반영하고, 시뮬레이션 대상에서는
// 뺀다 — 이미 끝난 경기까지 매번 새로 무작위 재시뮬레이션하던 걸 고침(6개 리그는 전부
// 개막 전이라 여태 이 경로가 한 번도 안 타서 안 드러났었음).
function simulateSeason(leagueKey, sims = 500) {
  const teams = LEAGUES[leagueKey].teams;
  if (!SCHEDULE.length) return null;

  // 실제 결과(치른 경기)와 남은 경기를 미리 한 번만 분리 — 시뮬레이션마다 다시 안 나눔.
  const basePoints = {}, baseGf = {}, baseGa = {};
  teams.forEach(t => { basePoints[t] = 0; baseGf[t] = 0; baseGa[t] = 0; });
  const remainingFixtures = [];
  let playedCount = 0, validFixtures = 0;
  for (const fixture of SCHEDULE) {
    const { home, away, homeGoals, awayGoals } = fixture || {};
    if (!basePoints.hasOwnProperty(home) || !basePoints.hasOwnProperty(away)) continue;
    validFixtures++; // 팀명 둘 다 확인된 경기(치른 경기+남은 경기 합계) — 기존 의미 유지
    if (Number.isFinite(homeGoals) && Number.isFinite(awayGoals)) {
      playedCount++;
      baseGf[home] += homeGoals; baseGa[home] += awayGoals;
      baseGf[away] += awayGoals; baseGa[away] += homeGoals;
      if (homeGoals > awayGoals) basePoints[home] += 3;
      else if (homeGoals < awayGoals) basePoints[away] += 3;
      else { basePoints[home] += 1; basePoints[away] += 1; }
    } else {
      remainingFixtures.push({ home, away });
    }
  }

  const titleCount = {}, relegationCount = {};
  teams.forEach(t => { titleCount[t] = 0; relegationCount[t] = 0; });
  const zoneSize = RELEGATION_ZONE[leagueKey] ?? 3;
  const safeSims = Number.isFinite(sims) && sims > 0 ? Math.floor(sims) : 500;

  for (let s = 0; s < safeSims; s++) {
    const points = { ...basePoints }, gf = { ...baseGf }, ga = { ...baseGa };

    for (const fixture of remainingFixtures) {
      const { home, away } = fixture;
      const { lambdaHome, lambdaAway } = computeLambdas(leagueKey, home, away);
      const hg = poissonRandom(lambdaHome), ag = poissonRandom(lambdaAway);
      gf[home] += hg; ga[home] += ag; gf[away] += ag; ga[away] += hg;
      if (hg > ag) points[home] += 3;
      else if (hg < ag) points[away] += 3;
      else { points[home] += 1; points[away] += 1; }
    }

    const table = teams.slice().sort((a, b) => {
      if (points[b] !== points[a]) return points[b] - points[a];
      return (gf[b] - ga[b]) - (gf[a] - ga[a]); // 골득실 타이브레이커
    });
    titleCount[table[0]]++;
    for (let i = teams.length - zoneSize; i < teams.length; i++) relegationCount[table[i]]++;
  }

  return {
    zoneSize,
    playedCount,
    validFixtures,
    totalFixtures: SCHEDULE.length,
    table: teams.map(t => ({
      team: t,
      titleProb: titleCount[t] / safeSims,
      relegationProb: relegationCount[t] / safeSims,
    })).sort((a, b) => b.titleProb - a.titleProb || b.relegationProb - a.relegationProb),
  };
}

// ============================================================ 팀 스타일 레이더 (EPL 앱 RadarChart 순수 SVG 로직 그대로 이식)
// EPL 앱은 xG/xGA/압박강도/필드틸트/세트피스/최근폼 6축을 쓰지만, 우리는 지금
// xG/xGA/ELO 3개 데이터만 있어서 3축으로 축소했다. 다른 축은 해당 데이터(PPDA,
// 필드틸트, 폼 등)가 파이프라인에 들어오면 그때 추가하면 된다.
const RADAR_AXES = ["공격(xG)", "수비", "ELO"];

function getTeamRadarProfile(leagueKey, team) {
  const teams = LEAGUES[leagueKey].teams;
  const raw = {};
  for (const t of teams) {
    const xg = TEAM_XG[t];
    const xG = xg && Number.isFinite(xg.xG) ? xg.xG : 1.35;
    const xGA = xg && Number.isFinite(xg.xGA) ? xg.xGA : 1.35;
    raw[t] = { "공격(xG)": xG, "수비": -xGA, "ELO": ELO[t] ?? 1500 };
  }
  const norm = {};
  teams.forEach(t => { norm[t] = {}; });
  for (const ax of RADAR_AXES) {
    const vals = teams.map(t => raw[t][ax]);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = max - min;
    for (const t of teams) norm[t][ax] = range > 1e-9 ? ((raw[t][ax] - min) / range) * 100 : 50;
  }
  return { raw: raw[team], norm: norm[team] };
}

function RadarChart({ axes, series, size = 220 }) {
  const center = size / 2;
  const radius = size / 2 - 40;
  const labelRadius = radius + 22;
  const angleStep = (Math.PI * 2) / axes.length;
  const ptAt = (value, i, r = radius) => {
    const angle = -Math.PI / 2 + i * angleStep;
    const rr = (value / 100) * r;
    return [center + rr * Math.cos(angle), center + rr * Math.sin(angle)];
  };
  const gridLevels = [20, 40, 60, 80, 100];
  return (
    <svg width={size} height={size} style={{display:"block", margin:"0 auto"}}>
      {gridLevels.map(lvl => (
        <polygon key={lvl} points={axes.map((_, i) => ptAt(lvl, i).join(",")).join(" ")}
          fill="none" stroke={T.border} strokeWidth={1}/>
      ))}
      {axes.map((_, i) => {
        const [x, y] = ptAt(100, i);
        return <line key={i} x1={center} y1={center} x2={x} y2={y} stroke={T.border} strokeWidth={1}/>;
      })}
      {series.map((s, si) => (
        <polygon key={si} points={s.values.map((v, i) => ptAt(v, i).join(",")).join(" ")}
          fill={s.color} fillOpacity={0.22} stroke={s.color} strokeWidth={2}/>
      ))}
      {axes.map((label, i) => {
        const angle = -Math.PI / 2 + i * angleStep;
        const x = center + labelRadius * Math.cos(angle);
        const y = center + labelRadius * Math.sin(angle);
        return (
          <text key={i} x={x} y={y} fill={T.muted} fontSize={10} fontWeight={700}
            textAnchor="middle" dominantBaseline="middle">{label}</text>
        );
      })}
    </svg>
  );
}

    </Card>

}

// ============================================================ 라이브 인플레이 재계산 (EPL 앱 이식)
function LiveInPlayPanel({home, away, lambdaHome, lambdaAway}) {
  const [active, setActive] = useState(false);
  const [hg, setHg] = useState("0");
  const [ag, setAg] = useState("0");
  const [minute, setMinute] = useState(45);
  const [live, setLive] = useState(null);
  const [busy, setBusy] = useState(false);

  const recalc = useCallback(() => {
    const curH = Math.max(0, Number(hg)||0);
    const curA = Math.max(0, Number(ag)||0);
    const min = Math.min(90, Math.max(0, Number(minute)||0));
    setBusy(true);
    setTimeout(() => {
      const remainFrac = Math.max(0, (90 - min) / 90);
      const rlh = Math.max(0.02, lambdaHome * remainFrac);
      const rla = Math.max(0.02, lambdaAway * remainFrac);
      const sims = 30000;
      let hw=0, dr=0, aw=0;
      const scoreCounts = {};
      for (let i=0;i<sims;i++) {
        const addH = poissonRandom(rlh);
        const addA = poissonRandom(rla);
        const fh = curH + addH, fa = curA + addA;
        if (fh > fa) hw++; else if (fh < fa) aw++; else dr++;
        const key = `${fh}-${fa}`;
        scoreCounts[key] = (scoreCounts[key]||0)+1;
      }
      const topScores = Object.entries(scoreCounts).sort((a,b)=>b[1]-a[1]).slice(0,3)
        .map(([score,count])=>({score, prob:count/sims}));
      setLive({ homeWinProb: hw/sims, drawProb: dr/sims, awayWinProb: aw/sims, topScores, minute: min, curH, curA, remainFrac });
      setBusy(false);
    }, 20);
  }, [hg, ag, minute, lambdaHome, lambdaAway]);

  return (
    <Card>
      <div style={{display:"flex", justifyContent:"space-between", alignItems:"center"}}>
        <div>
          <div style={{fontSize:12, fontWeight:700, color:T.text}}>🔴 라이브 인플레이 재계산</div>
          <div style={{fontSize:10.5, color:T.dim, marginTop:2}}>현재 스코어·경과 시간으로 남은 시간 기준 확률을 다시 계산합니다</div>
        </div>
        <button onClick={()=>setActive(a=>!a)} style={{fontSize:11, color:T.accent, background:"transparent",
                border:`1px solid ${T.border}`, borderRadius:8, padding:"5px 10px", cursor:"pointer", whiteSpace:"nowrap"}}>
          {active ? "접기" : "펼치기"}
        </button>
      </div>
      {active && (
        <div>
          <div style={{display:"flex", gap:8, alignItems:"center", marginTop:10}}>
            <span style={{fontSize:11.5, color:T.muted, flex:1, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{home}</span>
            <input type="number" min="0" value={hg} onChange={e=>setHg(e.target.value)}
              style={{width:50, padding:"7px", borderRadius:7, background:T.surface, border:`1px solid ${T.border}`, color:T.text, textAlign:"center"}}/>
            <span style={{color:T.muted}}>:</span>
            <input type="number" min="0" value={ag} onChange={e=>setAg(e.target.value)}
              style={{width:50, padding:"7px", borderRadius:7, background:T.surface, border:`1px solid ${T.border}`, color:T.text, textAlign:"center"}}/>
            <span style={{fontSize:11.5, color:T.muted, flex:1, textAlign:"right", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap"}}>{away}</span>
          </div>
          <div style={{marginTop:12}}>
            <div style={{display:"flex", justifyContent:"space-between", fontSize:11.5, color:T.muted}}>
              <span>경과 시간</span><span style={{color:T.text, fontWeight:700}}>{minute}분</span>
            </div>
            <input type="range" min="1" max="90" step="1" value={minute} onChange={e=>setMinute(Number(e.target.value))} style={{width:"100%", marginTop:6}}/>
          </div>
          <button onClick={recalc} disabled={busy}
            style={{width:"100%", marginTop:12, padding:"11px", borderRadius:9, border:"none",
                    background: busy ? T.dim : T.red, color:"#fff", fontSize:13, fontWeight:800, cursor:busy?"default":"pointer"}}>
            {busy ? "재계산 중..." : "🔴 실시간 확률 재계산"}
          </button>
          {live && (
            <div style={{marginTop:12}}>
              <div style={{textAlign:"center", fontSize:11, color:T.muted, marginBottom:6}}>
                {live.minute}분 경과 · 현재 {live.curH}-{live.curA} · 남은 {Math.round(live.remainFrac*90)}분 기준 재계산
              </div>
              <Bar label={`${home} 승`} value={live.homeWinProb} color={T.accent}/>
              <Bar label="무승부" value={live.drawProb} color={T.gold}/>
              <Bar label={`${away} 승`} value={live.awayWinProb} color={T.red}/>
              <div style={{fontSize:11, color:T.muted, marginTop:4, textAlign:"center"}}>
                예상 최종 스코어: {live.topScores.map(s=>`${s.score} (${(s.prob*100).toFixed(1)}%)`).join(" · ")}
              </div>
            </div>
          )}
        </div>
      )}
    </Card>
  );
}

// ============================================================ 배당 비교 대시보드 (EPL 앱 이식)
// 기존 fetchMatchOdds는 첫 북메이커만 썼는데, 여기서는 응답에 담긴 전체 북메이커를 추출한다.
function extractAllBookmakerOddsFromOddsApiIo(leagueKey, home, away, data, swapped) {
  if (!data) return [];
  const candidates = [];
  if (Array.isArray(data?.bookmakers)) candidates.push(...data.bookmakers);
  if (Array.isArray(data?.data?.bookmakers)) candidates.push(...data.data.bookmakers);
  const out = [];
  for (const bk of candidates) {
    const markets = bk?.markets || bk?.odds || [];
    if (!Array.isArray(markets)) continue;
    const h2h = markets.find(m => {
      const key = (m.key || m.market || m.name || "").toLowerCase();
      return key.includes("h2h") || key.includes("1x2") || key.includes("match winner");
    });
    if (!h2h || !Array.isArray(h2h.outcomes)) continue;
    let oh=null, od=null, oa=null;
    for (const o of h2h.outcomes) {
      const price = o.price ?? o.odds ?? o.value;
      if (typeof price !== "number") continue;
      const name = (o.name || o.label || "");
      if (/^draw$/i.test(name)) od = price;
      else if (isSameClubName(leagueKey, swapped ? away : home, name)) oh = price;
      else if (isSameClubName(leagueKey, swapped ? home : away, name)) oa = price;
    }
    if (oh == null || oa == null) continue;
    const bkName = bk.name || bk.key || bk.title || bk.bookmaker || "북메이커";
    out.push(swapped ? { bookmaker: bkName, home: oa, draw: od, away: oh } : { bookmaker: bkName, home: oh, draw: od, away: oa });
  }
  return out;
}

async function fetchAllBookmakerOdds(leagueKey, home, away) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 8000);
    const evUrl = `https://api.odds-api.io/v3/events?apiKey=${ODDS_API_IO_KEY}&sport=football&status=pending`;
    const res = await fetch(evUrl, { signal: controller.signal }).catch(() => null);
    clearTimeout(timer);
    if (!res || !res.ok) return [];
    const events = await res.json().catch(() => null);
    const list = Array.isArray(events) ? events : (Array.isArray(events?.data) ? events.data : null);
    if (!Array.isArray(list)) return [];

    const direct = list.find(ev => isSameClubName(leagueKey, home, ev.home) && isSameClubName(leagueKey, away, ev.away));
    const swapped = direct ? null : list.find(ev => isSameClubName(leagueKey, home, ev.away) && isSameClubName(leagueKey, away, ev.home));
    const match = direct || swapped;
    if (!match) return [];

    const oddsUrl = `https://api.odds-api.io/v3/odds?apiKey=${ODDS_API_IO_KEY}&eventId=${match.id}`;
    const oddsRes = await fetch(oddsUrl).catch(() => null);
    if (!oddsRes || !oddsRes.ok) return [];
    const oddsData = await oddsRes.json().catch(() => null);
    return extractAllBookmakerOddsFromOddsApiIo(leagueKey, home, away, oddsData, !!swapped);
  } catch (e) {
    return [];
  }
}

                    <div key={label} style={{flex:1, textAlign:"center", padding:"8px 4px", borderRadius:8,
                      background:T.surface, border:`1px solid ${ev!==null && ev>0.03 ? T.green : T.border}`}}>
                      <div style={{fontSize:10.5, color:T.muted}}>{label}</div>
                      <div style={{fontSize:13.5, fontWeight:800, marginTop:2, color: ev===null?"gray":ev>0.03?T.green:ev<-0.03?T.red:T.text}}>
                        {ev===null?"-":`${ev>=0?"+":""}${(ev*100).toFixed(1)}%`}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}
        </div>
      )}
    </Card>
  );
}

// ============================================================ 예측 결과 공유 카드 (EPL 앱 이식)
// 로고가 없는 팀(승격팀 등)은 CLUB_ABBR 약어를 원형 배지로 그려서 대체한다.
function loadImageAsync(src) {
  return new Promise((resolve, reject) => {
    if (!src) { reject(new Error("no src")); return; }
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}
function drawAbbrBadge(ctx, abbr, cx, cy, r) {
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = "#182640"; ctx.fill();
  ctx.strokeStyle = "#2979ff"; ctx.lineWidth = 3; ctx.stroke();
  ctx.fillStyle = "#e8f0fe";
  ctx.font = `bold ${Math.round(r*0.55)}px sans-serif`;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(abbr, cx, cy+2);
  ctx.restore();
}
function roundRectPath(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.arcTo(x+w, y, x+w, y+h, r); ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r); ctx.arcTo(x, y, x+w, y, r); ctx.closePath();
}
async function generateShareImage(leagueKey, home, away, result) {
  const W = 750, H = 1000;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, "#05080f"); grad.addColorStop(1, "#0b1220");
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  ctx.textAlign = "center";
  ctx.fillStyle = "#2979ff"; ctx.font = "bold 26px sans-serif";
  ctx.fillText(`⚽ ${LEAGUES[leagueKey].label} 예측기`, W/2, 58);
  ctx.fillStyle = "#6b8aad"; ctx.font = "14px sans-serif";
  ctx.fillText("ELO + xG 블렌딩 · 몬테카를로 10만회", W/2, 86);

  const crestSize = 110;
  try {
    const homeImg = await loadImageAsync(CLUB_LOGOS[home]);
    ctx.drawImage(homeImg, W*0.24 - crestSize/2, 130, crestSize, crestSize);
  } catch (e) { drawAbbrBadge(ctx, clubAbbr(home), W*0.24, 130+crestSize/2, crestSize/2); }
  try {
    const awayImg = await loadImageAsync(CLUB_LOGOS[away]);
    ctx.drawImage(awayImg, W*0.76 - crestSize/2, 130, crestSize, crestSize);
  } catch (e) { drawAbbrBadge(ctx, clubAbbr(away), W*0.76, 130+crestSize/2, crestSize/2); }

  ctx.fillStyle = "#e8f0fe"; ctx.font = "bold 20px sans-serif";
  ctx.fillText(home, W*0.24, 275); ctx.fillText(away, W*0.76, 275);
  ctx.fillStyle = "#6b8aad"; ctx.font = "bold 26px sans-serif";
  ctx.fillText("VS", W/2, 195);

  const top = result.topScores?.[0];
  if (top) {
    const [hg, ag] = top.score.split("-");
    ctx.fillStyle = "#00bcd4"; ctx.font = "bold 66px sans-serif";
    ctx.fillText(`${hg} : ${ag}`, W/2, 380);
    ctx.fillStyle = "#6b8aad"; ctx.font = "14px sans-serif";
    ctx.fillText(`자체 모델 예상 스코어 · 확률 ${(top.prob*100).toFixed(1)}%`, W/2, 406);
  }

  const barX = 60, barY = 450, barW = W-120, barH = 46;
  const hw = result.homeWinProb, dw = result.drawProb, aw = result.awayWinProb;
  ctx.save(); roundRectPath(ctx, barX, barY, barW, barH, 12); ctx.clip();
  let x = barX;
  for (const seg of [{w:barW*hw, color:"#2979ff"}, {w:barW*dw, color:"#6b8aad"}, {w:barW*aw, color:"#f5a623"}]) {
    ctx.fillStyle = seg.color; ctx.fillRect(x, barY, seg.w+1, barH); x += seg.w;
  }
  ctx.restore();

  ctx.font = "bold 16px sans-serif"; ctx.fillStyle = "#fff";
  ctx.textAlign = "left"; ctx.fillText(`${(hw*100).toFixed(0)}%`, barX+12, barY+barH/2+6);
  ctx.textAlign = "right"; ctx.fillText(`${(aw*100).toFixed(0)}%`, barX+barW-12, barY+barH/2+6);
  ctx.textAlign = "center";
  if (dw > 0.08) ctx.fillText(`${(dw*100).toFixed(0)}%`, barX+barW*hw+barW*dw/2, barY+barH/2+6);

  ctx.font = "13px sans-serif"; ctx.fillStyle = "#6b8aad";
  ctx.fillText(`${home} 승  ·  무승부  ·  ${away} 승`, W/2, barY+barH+26);

  ctx.font = "17px sans-serif"; ctx.fillStyle = "#e8f0fe";
  ctx.fillText(`예상 기대득점(λ)  ${result.lambdaHome.toFixed(2)} : ${result.lambdaAway.toFixed(2)}`, W/2, 570);

  ctx.font = "12px sans-serif"; ctx.fillStyle = "#2a3f5f";
  ctx.fillText(`생성일 ${new Date().toLocaleDateString("ko-KR")} · 통계 모델 기반 예측(참고용)`, W/2, H-42);
  ctx.fillText("v1.0 · 유럽 6대리그 예측기", W/2, H-22);
  return canvas;
}

function ShareResultPanel({leagueKey, home, away, result}) {
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState("");
  const handleShare = useCallback(() => {
    setBusy(true); setMsg("");
    generateShareImage(leagueKey, home, away, result).then(canvas => {
      canvas.toBlob(async (blob) => {
        if (!blob) { setBusy(false); setMsg("이미지 생성에 실패했습니다."); return; }
        const fileName = `${home}_vs_${away}_예측.png`;
        const file = (typeof File !== "undefined") ? new File([blob], fileName, {type:"image/png"}) : null;
        try {
          if (file && navigator.canShare && navigator.canShare({files:[file]})) {
            await navigator.share({ files:[file], title:`${home} vs ${away} 예측`, text:`${LEAGUES[leagueKey].label} 예측기 결과` });
            setMsg("공유 완료!");
          } else {
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url; a.download = fileName;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            setTimeout(()=>URL.revokeObjectURL(url), 5000);
            setMsg("이미지가 다운로드됐습니다.");
          }
        } catch (e) { setMsg("공유가 취소되었거나 실패했습니다."); }
        finally { setBusy(false); }
      }, "image/png");
    }).catch(() => { setBusy(false); setMsg("이미지 생성 중 오류가 발생했습니다."); });
  }, [leagueKey, home, away, result]);

  return (
    <Card style={{textAlign:"center"}}>
      <div style={{fontSize:12, fontWeight:700, color:T.text}}>🖼️ 예측 결과 공유</div>
      <div style={{fontSize:10.5, color:T.dim, marginTop:2, marginBottom:8}}>이미지 카드로 저장하거나 공유합니다</div>
      <button onClick={handleShare} disabled={busy}
        style={{width:"100%", padding:"12px", borderRadius:10, border:"none",
                background: busy ? T.dim : T.purple, color:"#fff", fontSize:14, fontWeight:800, cursor:busy?"default":"pointer"}}>
        {busy ? "이미지 생성 중..." : "📤 공유 카드 만들기"}
      </button>
      {msg && <div style={{fontSize:11.5, color:T.muted, marginTop:8}}>{msg}</div>}
    </Card>
  );
}

// getH2H/H2HCard: EPL 앱(index.html)의 getH2H/H2HCard를 이식. 이 앱엔 EPL의
// _liveResults(사용자가 직접 추적하는 실시간 결과) 개념이 없어서 그 부분은
// 빼고, 파이프라인 H2H(matches 테이블 기반, app_export_multileague.py
// build_h2h())만 쓴다 — 6개 리그 다 같은 구조라 그대로 재사용 가능.
function getH2H(teamA, teamB) {
  const key = [teamA, teamB].sort().join("|||");
  const raw = H2H[key] || [];
  const games = raw.map(g => ({ home: g.home, away: g.away, hg: g.homeGoals, ag: g.awayGoals, date: g.date || "" }))
    .sort((x, y) => (x.date < y.date ? 1 : -1)); // 최신순
  let aWin = 0, draw = 0, bWin = 0, aGF = 0, aGA = 0;
  for (const g of games) {
    const aIsHome = g.home === teamA;
    const aScore = aIsHome ? g.hg : g.ag;
    const bScore = aIsHome ? g.ag : g.hg;
    aGF += aScore; aGA += bScore;
    if (aScore > bScore) aWin++;
    else if (aScore < bScore) bWin++;
    else draw++;
  }
  return { games, aWin, draw, bWin, aGF, aGA, total: games.length };
}

function H2HCard({ teamA, teamB }) {
  const h = React.useMemo(() => getH2H(teamA, teamB), [teamA, teamB]);
  if (!h.total) {
    return (
      <Card>
        <div style={{fontSize:13, fontWeight:800, color:T.text, marginBottom:6}}>🤝 상대전적 (H2H)</div>
        <div style={{fontSize:12.5, color:T.muted, textAlign:"center", padding:"6px 0"}}>
          아직 {teamA} vs {teamB} 경기 결과가 파이프라인에 없습니다.
        </div>
      </Card>
    );
  }
  const barA = Math.round(h.aWin / h.total * 100);
  const barD = Math.round(h.draw / h.total * 100);
  const barB = 100 - barA - barD;
  return (
    <Card>
      <div style={{fontSize:13, fontWeight:800, color:T.text, marginBottom:2}}>🤝 상대전적 (H2H)</div>
      <div style={{fontSize:11, color:T.muted, marginBottom:8}}>최근 {h.total}경기 기준</div>
      <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginTop:4}}>
        <div style={{textAlign:"center", flex:1}}>
          <div style={{fontSize:11, color:T.muted}}>{teamA}</div>
          <div style={{fontSize:22, fontWeight:900, color:T.accent}}>{h.aWin}</div>
          <div style={{fontSize:10, color:T.dim}}>승</div>
        </div>
        <div style={{textAlign:"center", flex:0.7}}>
          <div style={{fontSize:11, color:T.muted}}>무</div>
          <div style={{fontSize:20, fontWeight:800, color:T.muted}}>{h.draw}</div>
          <div style={{fontSize:10, color:T.dim, marginTop:6}}>득실</div>
          <div style={{fontSize:12, color:T.text, fontFamily:"monospace"}}>{h.aGF} : {h.aGA}</div>
        </div>
        <div style={{textAlign:"center", flex:1}}>
          <div style={{fontSize:11, color:T.muted}}>{teamB}</div>
          <div style={{fontSize:22, fontWeight:900, color:T.gold}}>{h.bWin}</div>
          <div style={{fontSize:10, color:T.dim}}>승</div>
        </div>
      </div>
      <div style={{display:"flex", height:8, borderRadius:4, overflow:"hidden", marginTop:10, background:T.surface}}>
        <div style={{width:`${barA}%`, background:T.accent}}/>
        <div style={{width:`${barD}%`, background:T.dim}}/>
        <div style={{width:`${barB}%`, background:T.gold}}/>
      </div>
      <div style={{marginTop:12, borderTop:`1px solid ${T.border}`, paddingTop:8}}>
        <div style={{fontSize:11, color:T.muted, marginBottom:6}}>최근 맞대결</div>
        {h.games.slice(0,5).map((g,i) => (
          <div key={i} style={{display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"5px 0", borderTop: i>0?`1px solid ${T.border}`:"none", fontSize:12.5}}>
            <span style={{color:T.dim, fontSize:10.5, width:74}}>{g.date || "-"}</span>
            <span style={{flex:1, textAlign:"right"}}>{g.home}</span>
            <span style={{margin:"0 8px", fontFamily:"monospace", fontWeight:800, color:T.text}}>{g.hg}:{g.ag}</span>
            <span style={{flex:1}}>{g.away}</span>
          </div>
        ))}
      </div>
    </Card>
  );
}

// computeStandingsTable: SCHEDULE의 각 fixture에 homeGoals/awayGoals(둘 다 유효한 숫자)가
// 있으면 "치른 경기"로 간주해서 승점·득실차를 계산한다. 아직 스코어가 없는 fixture(대부분,
// 시즌 시작 전)는 조용히 건너뛴다 — 이게 안전한 이유는, 필드가 아예 없거나 값이 이상해도
// (문자열, null 등) Number.isFinite로 걸러지기 때문에 앱이 죽거나 잘못된 승점이 찍히지 않음.
// 정렬: 승점desc → 골득실desc → 다득점desc → (전부 동률이면) ELOdesc — 실제 EPL 앱의
// calcGroupStandings와 동일한 타이브레이커 순서.
function computeStandingsTable(leagueKey) {
  const teams = LEAGUES[leagueKey].teams;
  const table = {};
  teams.forEach(t => { table[t] = { team: t, elo: ELO[t] ?? 1500, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0 }; });

  let playedCount = 0;
  for (const fixture of SCHEDULE) {
    const { home, away, homeGoals, awayGoals } = fixture || {};
    if (!table[home] || !table[away]) continue;
    if (!Number.isFinite(homeGoals) || !Number.isFinite(awayGoals)) continue; // 아직 안 치른 경기
    playedCount++;
    const h = table[home], a = table[away];
    h.p++; a.p++;
    h.gf += homeGoals; h.ga += awayGoals;
    a.gf += awayGoals; a.ga += homeGoals;
    if (homeGoals > awayGoals) { h.w++; a.l++; h.pts += 3; }
    else if (homeGoals < awayGoals) { a.w++; h.l++; a.pts += 3; }
    else { h.d++; a.d++; h.pts += 1; a.pts += 1; }
  }

  const rows = Object.values(table).map(r => ({ ...r, gd: r.gf - r.ga }));
  rows.sort((x, y) =>
    (y.pts - x.pts) || (y.gd - x.gd) || (y.gf - x.gf) || (y.elo - x.elo)
  );
  return { rows, playedCount };
}

// ============================================================ 일정 .ics 캘린더 내보내기 (EPL 앱 이식)
function icsPad2(n) { return String(n).padStart(2, "0"); }
function icsDateTime(dateStr, timeStr) {
  const [y, m, d] = dateStr.split("-");
  const [hh, mm] = (timeStr || "00:00").split(":");
  return `${y}${m}${d}T${hh}${mm}00`;
}
function icsDateTimePlusHours(dateStr, timeStr, hours) {
  const dt = new Date(`${dateStr}T${timeStr || "00:00"}:00`);
  dt.setHours(dt.getHours() + hours);
  return `${dt.getFullYear()}${icsPad2(dt.getMonth()+1)}${icsPad2(dt.getDate())}T${icsPad2(dt.getHours())}${icsPad2(dt.getMinutes())}00`;
}
function generateICS(leagueLabel, matches) {
  const now = new Date();
  const stamp = `${now.getUTCFullYear()}${icsPad2(now.getUTCMonth()+1)}${icsPad2(now.getUTCDate())}T${icsPad2(now.getUTCHours())}${icsPad2(now.getUTCMinutes())}00Z`;
  const lines = ["BEGIN:VCALENDAR", "VERSION:2.0", "PRODID:-//6대리그 예측기//KO", "CALSCALE:GREGORIAN"];
  matches.forEach((g, i) => {
    if (!g.date) return;
    lines.push("BEGIN:VEVENT");
    lines.push(`UID:${leagueLabel}-${g.date}-${g.time||"00:00"}-${i}@sixleague-predictor`);
    lines.push(`DTSTAMP:${stamp}`);
    lines.push(`DTSTART:${icsDateTime(g.date, g.time)}`);
    lines.push(`DTEND:${icsDateTimePlusHours(g.date, g.time, 2)}`);
    lines.push(`SUMMARY:⚽ [${leagueLabel}] ${g.home} vs ${g.away}`);
    lines.push(`DESCRIPTION:${leagueLabel} · ${g.home} vs ${g.away}`);
    lines.push("END:VEVENT");
  });
  lines.push("END:VCALENDAR");
  return lines.join("\r\n");
}
function downloadICS(filename, content) {
  const blob = new Blob([content], {type:"text/calendar;charset=utf-8"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 5000);
}

// computeAccuracyMetrics: EPL 앱에서 그대로 이식 (순수 함수, history 데이터 구조가 동일해서
// 필드명 하나도 안 바꾸고 재사용 가능). 정산된(settled) 예측만으로 브라이어 스코어와
// 확신도 구간별(0-10%, 10-20%...) 실제 적중률(캘리브레이션)을 계산한다.
function computeAccuracyMetrics(entries) {
  const valid = (entries || []).filter(h => h && h.settled
    && h.actualHome != null && h.actualAway != null
    && typeof h.homeWinProb === "number" && typeof h.drawProb === "number" && typeof h.awayWinProb === "number");
  if (!valid.length) return null;

  let brierSum = 0;
  let dirHits = 0, exactHits = 0;
  const buckets = Array.from({length:10}, () => ({count:0, hits:0, confSum:0}));

  for (const h of valid) {
    const actual = h.actualHome > h.actualAway ? "home" : (h.actualHome < h.actualAway ? "away" : "draw");
    const oh = actual === "home" ? 1 : 0, od = actual === "draw" ? 1 : 0, oa = actual === "away" ? 1 : 0;
    const ph = h.homeWinProb, pd = h.drawProb, pa = h.awayWinProb;
    brierSum += (ph-oh)*(ph-oh) + (pd-od)*(pd-od) + (pa-oa)*(pa-oa);

    const predicted = (ph >= pd && ph >= pa) ? "home" : ((pa >= pd && pa >= ph) ? "away" : "draw");
    const confidence = Math.max(ph, pd, pa);
    if (predicted === actual) dirHits++;

    const [predH, predA] = h.topScore ? h.topScore.split("-").map(Number) : [null, null];
    if (predH === h.actualHome && predA === h.actualAway) exactHits++;

    const bIdx = Math.min(9, Math.max(0, Math.floor(confidence*10)));
    buckets[bIdx].count++;
    buckets[bIdx].confSum += confidence;
    if (predicted === actual) buckets[bIdx].hits++;
  }

  return {
    n: valid.length,
    brierScore: brierSum / valid.length,
    dirHitRate: dirHits / valid.length,
    exactHitRate: exactHits / valid.length,
    buckets: buckets.map((b, i) => ({
      range: `${i*10}–${(i+1)*10}%`,
      count: b.count,
      avgConfidence: b.count ? b.confSum / b.count : null,
      actualHitRate: b.count ? b.hits / b.count : null,
    })).filter(b => b.count > 0),
  };
}

        </div>

          ))}
        </React.Fragment>
      )}
      {stats.n < 20 && (

        </div>
      )}
    </Card>
  );
}

// ============================================================ 모델 vs 시장배당 괴리 추적 (EPL 앱 이식)
function computeModelVsMarketBias(entries) {
  const valid = (entries || []).filter(h => h && h.settled
    && h.actualHome != null && h.actualAway != null
    && h.marketProbs && typeof h.marketProbs.home === "number"
    && typeof h.homeWinProb === "number");
  if (!valid.length) return null;

  let biasSum = 0, modelBrierSum = 0, marketBrierSum = 0, modelCloser = 0;
  for (const h of valid) {
    const actual = h.actualHome > h.actualAway ? "home" : (h.actualHome < h.actualAway ? "away" : "draw");
    const oh = actual==="home"?1:0, od = actual==="draw"?1:0, oa = actual==="away"?1:0;
    biasSum += (h.homeWinProb - h.marketProbs.home);
    const mBrier = (h.homeWinProb-oh)**2 + (h.drawProb-od)**2 + (h.awayWinProb-oa)**2;
    const mkBrier = (h.marketProbs.home-oh)**2 + (h.marketProbs.draw-od)**2 + (h.marketProbs.away-oa)**2;
    modelBrierSum += mBrier; marketBrierSum += mkBrier;
    if (mBrier < mkBrier) modelCloser++;
  }
  return {
    n: valid.length,
    avgBias: biasSum / valid.length,
    modelBrier: modelBrierSum / valid.length,
    marketBrier: marketBrierSum / valid.length,
    modelCloserRate: modelCloser / valid.length,
  };
}

function ModelVsMarketPanel({history}) {
  const bias = useMemo(() => computeModelVsMarketBias(history), [history]);
  if (!bias || bias.n < 5) {
    return (
      <Card>
        <div style={{fontSize:12, fontWeight:700, color:T.text}}>📐 모델 vs 시장배당 괴리</div>

        </div>
      </Card>
    );
  }
  const biasPct = bias.avgBias * 100;
  const biasLabel = Math.abs(biasPct) < 1.5 ? "시장과 거의 일치" : (biasPct > 0 ? "홈팀에 더 낙관적" : "원정팀에 더 낙관적(홈에 비관적)");
  const biasColor = Math.abs(biasPct) < 1.5 ? T.green : T.gold;
  return (
    <Card>
      <div style={{fontSize:12, fontWeight:700, color:T.text}}>📐 모델 vs 시장배당 괴리</div>
      <div style={{fontSize:10.5, color:T.dim, marginTop:2, marginBottom:8}}>정산 {bias.n}건 기준</div>
      <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:8}}>
        <div style={{background:T.surface, borderRadius:9, padding:"10px 8px", border:`1px solid ${T.border}`, textAlign:"center"}}>
          <div style={{fontSize:18, fontWeight:900, color:biasColor}}>{biasPct>=0?"+":""}{biasPct.toFixed(1)}%p</div>
          <div style={{fontSize:10, color:T.muted, marginTop:2}}>평균 편향(모델−시장)</div>
          <div style={{fontSize:9.5, color:biasColor, marginTop:2, fontWeight:700}}>{biasLabel}</div>
        </div>
        <div style={{background:T.surface, borderRadius:9, padding:"10px 8px", border:`1px solid ${T.border}`, textAlign:"center"}}>
          <div style={{fontSize:18, fontWeight:900, color: bias.modelCloserRate>0.5 ? T.green : T.red}}>{(bias.modelCloserRate*100).toFixed(0)}%</div>
          <div style={{fontSize:10, color:T.muted, marginTop:2}}>모델이 시장보다 정확했던 비율</div>
          <div style={{fontSize:9.5, color:T.dim, marginTop:2}}>모델 {bias.modelBrier.toFixed(3)} · 시장 {bias.marketBrier.toFixed(3)}</div>
        </div>
      </div>
    </Card>
  );
}

function HistoryTab({ leagueKey }) {
  const [history, setHistory] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [settleInputs, setSettleInputs] = useState({}); // id -> {h,a}

  const storageKey = `wc:history:${leagueKey}`;

  const load = useCallback(async () => {
    try {
      const saved = await window.storage.get(storageKey);
      setHistory(saved && saved.value ? JSON.parse(saved.value) : []);
    } catch (e) {
      setHistory([]);
    }
    setLoaded(true);
  }, [storageKey]);

  useEffect(() => { setLoaded(false); load(); }, [leagueKey, load]);

  const persist = async (list) => {
    setHistory(list);
    try { await window.storage.set(storageKey, JSON.stringify(list)); } catch (e) {}
  };

  const settle = async (id) => {
    const input = settleInputs[id];
    if (!input || input.h === "" || input.a === "") return;
    const h = Number(input.h), a = Number(input.a);
    if (!Number.isFinite(h) || !Number.isFinite(a) || h < 0 || a < 0) return;
    const list = history.map(entry => entry.id === id
      ? { ...entry, settled: true, actualHome: h, actualAway: a }
      : entry);
    await persist(list);
  };

  const removeEntry = async (id) => {
    await persist(history.filter(entry => entry.id !== id));
  };

  const clearAll = async () => {
    await persist([]);
  };

  if (!loaded) return <Card><div style={{textAlign:"center", color:T.muted, fontSize:13}}>불러오는 중...</div></Card>;

  const settled = history.filter(h => h.settled);
  const dirHits = settled.filter(h => {
    const predicted = h.homeWinProb > h.awayWinProb ? (h.homeWinProb > h.drawProb ? "home" : "draw") : (h.awayWinProb > h.drawProb ? "away" : "draw");
    const actual = h.actualHome > h.actualAway ? "home" : (h.actualHome < h.actualAway ? "away" : "draw");
    return predicted === actual;
  }).length;
  const exactHits = settled.filter(h => h.topScore === `${h.actualHome}-${h.actualAway}`).length;

  return (
    <div>
      <Card>
        <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, textAlign:"center"}}>
          <div><div style={{fontSize:18, fontWeight:800, color:T.text}}>{history.length}</div><div style={{fontSize:10, color:T.muted}}>저장</div></div>
          <div><div style={{fontSize:18, fontWeight:800, color:T.muted}}>{history.length - settled.length}</div><div style={{fontSize:10, color:T.muted}}>미정산</div></div>
          <div><div style={{fontSize:18, fontWeight:800, color:T.cyan}}>{dirHits}/{settled.length}</div><div style={{fontSize:10, color:T.muted}}>방향적중</div></div>
          <div><div style={{fontSize:18, fontWeight:800, color:T.green}}>{exactHits}/{settled.length}</div><div style={{fontSize:10, color:T.muted}}>스코어적중</div></div>
        </div>
        {settled.length > 0 && (
          <div style={{marginTop:8, padding:"6px 0", borderTop:`1px solid ${T.border}`, textAlign:"center"}}>
            <span style={{fontSize:11, color:T.muted}}>방향 적중률 </span>
            <span style={{fontSize:14, fontWeight:800, color:T.accent}}>{(dirHits/settled.length*100).toFixed(0)}%</span>
          </div>
        )}
      </Card>

      <AccuracyPanel history={history}/>
      <ModelVsMarketPanel history={history}/>

      {history.length === 0 ? (
        <Card>
          <div style={{textAlign:"center", padding:"16px 8px", color:T.muted, fontSize:12.5}}>
            아직 저장된 예측이 없습니다. 예측 탭에서 "이 예측 기록에 저장"을 눌러보세요.
          </div>
        </Card>
      ) : (
        <React.Fragment>
          {history.map(h => (
            <Card key={h.id} style={{marginBottom:8}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6}}>
                <span style={{fontSize:13, color:T.text, fontWeight:700, display:"flex", alignItems:"center", gap:6}}>
                  <TeamCrest name={h.home} size={20}/> {h.home} vs {h.away} <TeamCrest name={h.away} size={20}/>
                </span>
                <button onClick={()=>removeEntry(h.id)} style={{background:"none", border:"none", color:T.dim, fontSize:11, cursor:"pointer"}}>삭제</button>
              </div>
              <div style={{fontSize:11, color:T.muted, marginBottom:6}}>
                예측: {h.home} {(h.homeWinProb*100).toFixed(0)}% · 무 {(h.drawProb*100).toFixed(0)}% · {h.away} {(h.awayWinProb*100).toFixed(0)}%
                {h.topScore && ` · 예상 ${h.topScore}`}
              </div>
              {h.settled ? (
                <div style={{fontSize:12, color:T.green, fontWeight:700}}>
                  ✅ 실제 결과: {h.actualHome}-{h.actualAway}
                </div>
              ) : (
                <div style={{display:"flex", gap:6, alignItems:"center"}}>
                  <input type="number" min="0" placeholder="홈" value={settleInputs[h.id]?.h ?? ""}
                    onChange={e => setSettleInputs(s => ({ ...s, [h.id]: { ...s[h.id], h: e.target.value } }))}
                    style={{width:50, background:T.surface, border:`1px solid ${T.border}`, color:T.text, borderRadius:6, padding:"5px 6px", fontSize:12}}/>
                  <span style={{color:T.muted}}>:</span>
                  <input type="number" min="0" placeholder="원정" value={settleInputs[h.id]?.a ?? ""}
                    onChange={e => setSettleInputs(s => ({ ...s, [h.id]: { ...s[h.id], a: e.target.value } }))}
                    style={{width:50, background:T.surface, border:`1px solid ${T.border}`, color:T.text, borderRadius:6, padding:"5px 6px", fontSize:12}}/>
                  <button onClick={()=>settle(h.id)}
                    style={{flex:1, padding:"6px 0", borderRadius:6, border:"none", background:T.accent, color:"#fff", fontSize:11.5, fontWeight:700, cursor:"pointer"}}>
                    결과 입력해서 정산
                  </button>
                </div>
              )}
            </Card>
          ))}
          <button onClick={clearAll}
            style={{width:"100%", padding:"9px 0", borderRadius:10, border:`1px solid ${T.border}`, background:"transparent", color:T.dim, fontSize:11.5, cursor:"pointer"}}>
            전체 기록 삭제
          </button>
        </React.Fragment>
      )}
    </div>
  );
}

// 실제로는 빈 값이라(2026-07-18 확인) 여기선 아예 안 만들었다 — 없는 자리를
