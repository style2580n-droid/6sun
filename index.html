function LeaderboardTab({ leagueKey }) {
  const lg = LEAGUES[leagueKey];
  const [metric, setMetric] = useState("scorers"); // scorers | assists

  const rows = useMemo(() => {
    const src = LEADERBOARD[metric] || {};
    return Object.entries(src)
      .map(([key, val]) => {
        const idx = key.lastIndexOf("|");
        const name = idx >= 0 ? key.slice(0, idx) : key;
        const team = idx >= 0 ? key.slice(idx + 1) : "";
        return { name, team, val };
      })
      .sort((a, b) => b.val - a.val)
      .slice(0, 20);
  }, [metric]);

  const hasAny = Object.keys(LEADERBOARD.scorers || {}).length > 0 ||
                 Object.keys(LEADERBOARD.assists || {}).length > 0;

  if (!hasAny) {
    return (
      <Card>
        <div style={{textAlign:"center", padding:"24px 8px"}}>
          <div style={{fontSize:28, marginBottom:8}}>⚽</div>
          <div style={{fontSize:13.5, color:T.text, fontWeight:700, marginBottom:6}}>
            {lg.label} 득점왕/도움왕 데이터가 아직 없습니다
          </div>
          <div style={{fontSize:12, color:T.muted, lineHeight:1.6}}>
            2026-27 시즌이 아직 개막 전이라(8월 예정) 종료된 경기가 없습니다.
            시즌이 시작되고 경기가 끝날 때마다 <code style={{color:T.cyan}}>collect_goalscorers.py</code>가
            자동으로 득점자·도움 기록을 쌓으면 여기 자동으로 표시됩니다.
          </div>
        </div>
      </Card>
    );
  }

  return (
    <div>
      <Card>
        <div style={{display:"flex", gap:8}}>
          {[{id:"scorers", label:"⚽ 득점왕"}, {id:"assists", label:"🎯 도움왕"}].map(m => (
            <button key={m.id} onClick={() => setMetric(m.id)}
              style={{
                flex:1, padding:"9px 0", borderRadius:8, border:`1px solid ${T.border}`,
                background: metric === m.id ? T.accent : T.surface,
                color: metric === m.id ? "#fff" : T.text,
                fontSize:13, fontWeight:700, cursor:"pointer",
              }}>
              {m.label}
            </button>
          ))}
        </div>
      </Card>
      <Card>
        {rows.length === 0 ? (
          <div style={{fontSize:12.5, color:T.muted, textAlign:"center", padding:"12px 0"}}>
            {metric === "scorers" ? "득점" : "도움"} 기록이 아직 없습니다.
          </div>
        ) : (
          <div style={{display:"flex", flexDirection:"column", gap:2}}>
            {rows.map((r, i) => (
              <div key={i} style={{
                display:"flex", alignItems:"center", gap:10, padding:"9px 4px",
                borderTop: i > 0 ? `1px solid ${T.border}` : "none",
              }}>
                <div style={{
                  width:22, textAlign:"center", fontSize:12.5, fontWeight:800,
                  color: i < 3 ? T.gold : T.dim,
                }}>{i + 1}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13.5, color:T.text, fontWeight:700}}>{r.name}</div>
                  {r.team && <div style={{fontSize:11, color:T.muted}}>{r.team}</div>}
                </div>
                <div style={{fontSize:16, fontWeight:900, color:T.accent}}>{r.val}</div>
              </div>
            ))}
          </div>
        )}
      </Card>
    </div>
  );
}

function SquadTab({ leagueKey }) {
  const lg = LEAGUES[leagueKey];
  const teams = lg.teams;
  const [team, setTeam] = useState(teams[0]);

  useEffect(() => { setTeam(teams[0]); }, [leagueKey]);

  const squad = SQUADS[team];
  const xg = TEAM_XG[team];
  const xgValid = xg && Number.isFinite(xg.xG) && Number.isFinite(xg.xGA);
  const elo = ELO[team];

  const POS_LABELS = [
    { key: "gk", label: "GK", color: T.amber || T.cyan },
    { key: "df", label: "DF", color: T.cyan },
    { key: "mf", label: "MF", color: T.green },
    { key: "fw", label: "FW", color: T.red },
  ];

  return (
    <div>
      <Card>
        <select value={team} onChange={e => setTeam(e.target.value)}
          style={{width:"100%", padding:"9px 10px", borderRadius:8, border:`1px solid ${T.border}`,
                  background:T.surface, color:T.text, fontSize:13.5, fontWeight:700}}>
          {teams.map(t => <option key={t} value={t}>{t}</option>)}
        </select>
      </Card>

      {!squad ? (
        <Card>
          <div style={{textAlign:"center", padding:"20px 8px"}}>
            <div style={{fontSize:28, marginBottom:8}}>👥</div>
            <div style={{fontSize:13.5, color:T.text, fontWeight:700, marginBottom:6}}>
              {team} 스쿼드가 아직 연동되지 않았습니다
            </div>
            <div style={{fontSize:12, color:T.muted, lineHeight:1.6}}>
              epl-management 파이프라인이 <code style={{color:T.cyan}}>reports/app_data_multileague.js</code>를
              통해 <code style={{color:T.cyan}}>window.PIPELINE_DATA_{leagueKey.toUpperCase()}.squads</code>를
              채워주면 이 탭에 실제 선수단이 자동으로 표시됩니다.
            </div>
          </div>
        </Card>
      ) : (
        <>
          <Card>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between"}}>
              <div style={{display:"flex", alignItems:"center", gap:10}}>
                <TeamCrest name={team} size={38}/>
                <div>
                  <div style={{fontSize:17, fontWeight:800, color:T.text}}>{team}</div>
                  <div style={{fontSize:12, color:T.muted}}>
                    {lg.label} · 선수 {squad.all.length}명{squad.coach && ` · 감독 ${squad.coach}`}
                  </div>
                </div>
              </div>
            </div>
            <div style={{display:"flex", gap:14, marginTop:12, fontSize:12}}>
              {elo != null && <div><span style={{color:T.muted}}>ELO </span><b style={{color:T.cyan}}>{Math.round(elo)}</b></div>}
              {xgValid && <div><span style={{color:T.muted}}>xG </span><b>{xg.xG.toFixed(2)}</b></div>}
              {xgValid && <div><span style={{color:T.muted}}>xGA </span><b>{xg.xGA.toFixed(2)}</b></div>}
            </div>
            {!xgValid && (
              <div style={{fontSize:11, color:T.dim, marginTop:8}}>
                ⚠️ xG 기록 없음 — 24-25/25-26 시즌 상위리그 경험이 없는 신규 승격팀일 수 있습니다.
              </div>
            )}
          </Card>

          {(() => {
            const inj = TEAM_INJURIES[team];
            const fat = TEAM_FATIGUE[team];
            const hasInj = inj && ((inj.keyOut && inj.keyOut.length) || (inj.injured && inj.injured.length));
            const hasFat = fat && Number.isFinite(fat.fatigueScore) && fat.fatigueScore > 0;
            if (!hasInj && !hasFat) return (
              <Card>
                <div style={{fontSize:11, color:T.dim}}>
                  🩹 부상자 · ✈️ 월드컵 여독 데이터 아직 없음 — 연동되면 여기 자동 표시됩니다.
                </div>
              </Card>
            );
            return (
              <Card>
                {hasInj && (
                  <div style={{marginBottom: hasFat ? 10 : 0}}>
                    <div style={{fontSize:12, fontWeight:700, color:T.red, marginBottom:4}}>🩹 부상자</div>
                    {inj.keyOut && inj.keyOut.length > 0 && (
                      <div style={{fontSize:12, color:T.text, marginBottom:2}}>핵심 결장: {inj.keyOut.join(", ")}</div>
                    )}
                    {inj.injured && inj.injured.length > 0 && (
                      <div style={{fontSize:12, color:T.muted}}>로테이션: {inj.injured.join(", ")}</div>
                    )}
                  </div>
                )}
                {hasFat && (
                  <div>
                    <div style={{fontSize:12, fontWeight:700, color:T.cyan, marginBottom:4}}>✈️ 월드컵 여독</div>
                    <div style={{fontSize:12, color:T.text}}>피로도 점수 {(fat.fatigueScore*100).toFixed(0)}%</div>
                  </div>
                )}
              </Card>
            );
          })()}

          <TransfersPanel team={team}/>

          {squad.hasPositions ? (
            <Card>
              <div style={{fontSize:12, color:T.muted, marginBottom:10}}>
                포지션은 BSD 데이터 기준 자동 분류입니다 — 세부 표기가 애매한 선수는 MF로 잡힐 수 있습니다.
              </div>
              {POS_LABELS.map(({key, label, color}) => {
                const names = squad[key] || [];
                if (!names.length) return null;
                return (
                  <div key={key} style={{marginBottom:12}}>
                    <div style={{fontSize:11.5, fontWeight:700, color, marginBottom:6}}>{label} · {names.length}명</div>
                    <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                      {names.map((p, i) => (
                        <span key={i} style={{fontSize:12.5, color:T.text, background:T.surface,
                          border:`1px solid ${T.border}`, borderRadius:14, padding:"5px 10px"}}>
                          {p}
                        </span>
                      ))}
                    </div>
                  </div>
                );
              })}
            </Card>
          ) : (
            <Card>
              <div style={{fontSize:12, color:T.muted, marginBottom:10}}>
                ⚠️ 포지션 정보 없음(football-data.org 폴백 경로) — 전체 명단만 표시합니다.
              </div>
              <div style={{display:"flex", flexWrap:"wrap", gap:6}}>
                {squad.all.map((p, i) => (
                  <span key={i} style={{fontSize:12.5, color:T.text, background:T.surface,
                    border:`1px solid ${T.border}`, borderRadius:14, padding:"5px 10px"}}>
                    {p}
                  </span>
                ))}
              </div>
            </Card>
          )}
        </>
      )}
    </div>
  );
}

const TABS = [
  { id:"predict", label:"예측" },
  { id:"standings", label:"리그순위" },
  { id:"outlook", label:"🔮 시즌전망" },
  { id:"teams", label:"팀 명단" },
  { id:"ranking", label:"레이팅" },
  { id:"schedule", label:"일정" },
  { id:"squads", label:"👥 스쿼드" },
  { id:"leaderboard", label:"⚽ 시즌기록" },
  { id:"history", label:"📝 기록" },
  { id:"settings", label:"⚙️ 설정" },
];

function App() {
  const [leagueKey, setLeagueKey] = useState("laliga");
  const [leagueVersion, setLeagueVersion] = useState(0);
  const [tab, setTab] = useState("predict");
  const [ready, setReady] = useState(false);
  const [pipelineStatus, setPipelineStatus] = useState(null); // null=확인중, true=연결됨, false=미연결
  const [favorites, setFavorites] = useState([]); // 현재 리그의 즐겨찾기 팀 목록
  const [notifyEnabled, setNotifyEnabled] = useState(false);
  const notifiedRef = useRef(new Set()); // "홈_원정_날짜_시각_30" 같은 키로 중복 알림 방지
  const [themeMode, setThemeMode] = useState("dark");
  const [themeTick, setThemeTick] = useState(0); // 시스템 모드일 때 OS 설정 변경 감지용 강제 리렌더

  useEffect(() => {
    (async () => {
      let mode = "dark";
      try {
        const r = await window.storage.get("wc:themeMode", false);
        if (r?.value === "light" || r?.value === "dark" || r?.value === "system") mode = r.value;
      } catch (e) {}
      applyTheme(mode);
      setThemeMode(mode);
    })();
  }, []);

  // 시스템 모드일 때 OS 다크/라이트 설정이 바뀌면 실시간 반영
  useEffect(() => {
    if (themeMode !== "system" || typeof window === "undefined" || !window.matchMedia) return;
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const handler = () => { applyTheme("system"); setThemeTick(v => v + 1); };
    try { mq.addEventListener("change", handler); } catch (e) { mq.addListener && mq.addListener(handler); }
    return () => { try { mq.removeEventListener("change", handler); } catch (e) { mq.removeListener && mq.removeListener(handler); } };
  }, [themeMode]);

  const changeTheme = useCallback((mode) => {
    applyTheme(mode);
    setThemeMode(mode);
    window.storage.set("wc:themeMode", mode, false).catch(() => {});
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const saved = await window.storage.get("wc:notifyEnabled", false);
        setNotifyEnabled(saved && saved.value === "1");
      } catch (e) {}
    })();
  }, []);

  const toggleNotify = useCallback(async (checked) => {
    if (checked && typeof Notification !== "undefined" && Notification.permission === "default") {
      try { await Notification.requestPermission(); } catch (e) {}
    }
    setNotifyEnabled(checked);
    window.storage.set("wc:notifyEnabled", checked ? "1" : "0").catch(() => {});
  }, []);

  // 킥오프 알림 — 현재 리그의 SCHEDULE + favorites만 대상으로 30초마다 확인한다.
  // (이 앱은 리그를 전환하면 그 리그 데이터만 메모리에 있으므로, 지금 열어둔 리그
  // 탭의 즐겨찾기 경기만 알림 대상이 됨 — EPL 앱과 동일하게 "이 탭이 열려있는 동안만" 동작)
  useEffect(() => {
    if (!notifyEnabled) return;
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;

    const check = () => {
      const now = Date.now();
      for (const g of SCHEDULE) {
        if (!favorites.includes(g.home) && !favorites.includes(g.away)) continue;
        const kickoff = getKickoffDate(g);
        if (!kickoff) continue;
        const minsLeft = (kickoff.getTime() - now) / 60000;
        for (const threshold of [30, 10]) {
          const key = `${g.home}_${g.away}_${g.date}_${g.time}_${threshold}`;
          if (minsLeft <= threshold && minsLeft > threshold - 1 && !notifiedRef.current.has(key)) {
            notifiedRef.current.add(key);
            try {
              new Notification(`⚽ ${threshold}분 후 킥오프`, { body: `${g.home} vs ${g.away}` });
            } catch (e) {}
          }
        }
      }
    };
    check();
    const timer = setInterval(check, 30000);
    return () => clearInterval(timer);
  }, [notifyEnabled, favorites, leagueVersion]);

  // 부상자 변경 알림 (EPL 앱 이식) — 리그 전환/새로고침 시 즐겨찾기 팀의 TEAM_INJURIES를
  // 직전 방문 스냅샷과 비교해서 새로 추가된 항목이 있으면 알림.
  useEffect(() => {
    if (!notifyEnabled || !favorites.length) return;
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
    (async () => {
      const snapKey = `wc:injurySnapshot:${leagueKey}`;
      let snapshot = {};
      try {
        const r = await window.storage.get(snapKey);
        if (r && r.value) snapshot = JSON.parse(r.value);
      } catch (e) {}
      const nextSnapshot = { ...snapshot };
      for (const team of favorites) {
        const inj = TEAM_INJURIES[team];
        const current = inj ? [...(inj.keyOut||[]).map(n=>`핵심:${n}`), ...(inj.injured||[]).map(n=>`로테이션:${n}`)] : [];
        const prev = snapshot[team] || [];
        const newItems = current.filter(x => !prev.includes(x));
        if (prev.length > 0 && newItems.length > 0) {
          try {
            new Notification(`🩹 ${team} 부상자 소식 업데이트`, { body: newItems.slice(0,3).join(" · ") });
          } catch (e) {}
        }
        nextSnapshot[team] = current;
      }
      window.storage.set(snapKey, JSON.stringify(nextSnapshot)).catch(() => {});
    })();
  }, [notifyEnabled, favorites, leagueVersion, leagueKey]);

  // 이적 변경 알림 (2026-07-16 추가, EPL 앱엔 없던 기능 — 이 앱은 TRANSFERS가
  // 팀당 최근 20건 누적이라 "새로 생긴 항목"을 감지하기 좋음) — 부상 알림과
  // 완전히 동일한 스냅샷-diff 패턴, 영입/이탈을 합쳐서 한 스냅샷으로 비교.
  useEffect(() => {
    if (!notifyEnabled || !favorites.length) return;
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;
    (async () => {
      const snapKey = `wc:transferSnapshot:${leagueKey}`;
      let snapshot = {};
      try {
        const r = await window.storage.get(snapKey);
        if (r && r.value) snapshot = JSON.parse(r.value);
      } catch (e) {}
      const nextSnapshot = { ...snapshot };
      for (const team of favorites) {
        const tr = TRANSFERS[team];
        const current = tr ? [
          ...(tr.in||[]).map(x=>`영입:${x.player}(${x.from})`),
          ...(tr.out||[]).map(x=>`이탈:${x.player}(${x.to})`),
        ] : [];
        const prev = snapshot[team] || [];
        const newItems = current.filter(x => !prev.includes(x));
        if (prev.length > 0 && newItems.length > 0) {
          try {
            new Notification(`🔄 ${team} 이적 소식 업데이트`, { body: newItems.slice(0,3).join(" · ") });
          } catch (e) {}
        }
        nextSnapshot[team] = current;
      }
      window.storage.set(snapKey, JSON.stringify(nextSnapshot)).catch(() => {});
    })();
  }, [notifyEnabled, favorites, leagueVersion, leagueKey]);

  useEffect(() => {
    (async () => {
      // 리그별 저장된 동적 ELO가 있으면 불러오고, 없으면 1500 기본값 시드 유지
      switchLeagueData(leagueKey);
      try {
        const saved = await window.storage.get(`wc:elo:${leagueKey}`);
        if (saved && saved.value) {
          const parsed = JSON.parse(saved.value);
          Object.assign(ELO, parsed);
        }
      } catch (e) {}
      try {
        const favSaved = await window.storage.get(`wc:favorites:${leagueKey}`);
        setFavorites(favSaved && favSaved.value ? JSON.parse(favSaved.value) : []);
      } catch (e) {
        setFavorites([]);
      }
      // 파이프라인이 아직 없으면 scheduleLoaded/logosLoaded 둘 다 false로 조용히 반환됨 (오류 아님)
      const { scheduleLoaded, logosLoaded } = await loadPipelineData(leagueKey);
      setPipelineStatus(scheduleLoaded || logosLoaded);
      setLeagueVersion(v => v + 1);
      setReady(true);
    })();
  }, [leagueKey]);

  const toggleFavorite = useCallback(async (team) => {
    setFavorites(prev => {
      const next = prev.includes(team) ? prev.filter(t => t !== team) : [...prev, team];
      window.storage.set(`wc:favorites:${leagueKey}`, JSON.stringify(next)).catch(() => {});
      return next;
    });
  }, [leagueKey]);

  const onSelectLeague = useCallback((k) => {
    if (k === leagueKey) return;
    setReady(false);
    setLeagueKey(k);
    setTab("predict");
  }, [leagueKey]);

  const forceRefresh = useCallback(() => setLeagueVersion(v => v + 1), []);

  return (
    <div style={{maxWidth:520, margin:"0 auto", minHeight:"100vh", paddingBottom:30}}>
      <div style={{padding:"18px 14px 10px", textAlign:"center"}}>
        <div style={{fontSize:19, fontWeight:900, color:T.text}}>⚽ 유럽 6대리그 예측기 <span style={{fontSize:12.5, color:T.cyan, fontWeight:600}}>v0.1</span></div>
        <div style={{fontSize:11, color:T.muted, marginTop:3}}>
          라리가 · 분데스리가 · 세리에A · 리그앙 · 에레디비시 · 챔피언십
        </div>
      </div>

      <LeaguePicker leagueKey={leagueKey} onChange={onSelectLeague}/>

      <div style={{display:"flex", overflowX:"auto", gap:6, padding:"0 12px 10px", borderBottom:`1px solid ${T.border}`}}>
        {TABS.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:"0 0 auto", padding:"8px 14px", borderRadius:20, border:"none", cursor:"pointer",
                    fontSize:13, fontWeight:700, whiteSpace:"nowrap",
                    background: tab===t.id ? T.accent : T.surface,
                    color: tab===t.id ? "#fff" : T.muted}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"12px 12px 0"}}>
        {!ready ? (
          <Card><div style={{textAlign:"center", color:T.muted, fontSize:13}}>불러오는 중...</div></Card>
        ) : (
          <React.Fragment key={leagueVersion}>
            {tab === "predict" && <PredictTab leagueKey={leagueKey}/>}
            {tab === "teams" && <TeamListTab leagueKey={leagueKey} favorites={favorites} onToggleFavorite={toggleFavorite}/>}
            {tab === "ranking" && <RankingTab leagueKey={leagueKey}/>}
            {tab === "schedule" && <ScheduleTab leagueKey={leagueKey}/>}
            {tab === "squads" && <SquadTab leagueKey={leagueKey}/>}
            {tab === "leaderboard" && <LeaderboardTab leagueKey={leagueKey}/>}
            {tab === "standings" && <StandingsTab leagueKey={leagueKey}/>}
            {tab === "settings" && <SettingsTab leagueKey={leagueKey} favorites={favorites} onToggleFavorite={toggleFavorite} onDataReset={forceRefresh} notifyEnabled={notifyEnabled} onToggleNotify={toggleNotify} themeMode={themeMode} onChangeTheme={changeTheme}/>}
            {tab === "outlook" && <SeasonOutlookTab leagueKey={leagueKey}/>}
            {tab === "history" && <HistoryTab leagueKey={leagueKey}/>}
          </React.Fragment>
        )}
      </div>

      <div style={{textAlign:"center", marginTop:24, fontSize:10, color:T.dim, padding:"0 20px"}}>
        {pipelineStatus === null ? (
          <span>⏳ 파이프라인 연결 확인 중...</span>
        ) : pipelineStatus ? (
          <span style={{color:T.green}}>✅ 파이프라인 연결됨 — 이 리그는 실데이터 적용됨</span>
        ) : (
          <span>⚠️ 파이프라인 미연결 — 아직 스켈레톤(ELO 1500 기본값)입니다</span>
        )}
        <br/>다음 단계: 로고 매핑 → 예측 엔진 고도화
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { hasError:false, err:null }; }
  static getDerivedStateFromError(err){ return { hasError:true, err }; }
  render(){
    if (this.state.hasError) {
      return <div style={{padding:20,color:"#ff6b6b",fontFamily:"monospace",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>
        ⚠️ 렌더링 오류\n\n{String(this.state.err && this.state.err.message || this.state.err)}
      </div>;
    }
    return this.props.children;
  }
}

try {
  document.getElementById("root").dataset.mounted = "1";
  ReactDOM.createRoot(document.getElementById("root")).render(
    <ErrorBoundary><App/></ErrorBoundary>
  );
} catch (e) {
  const el = document.getElementById("root");
  if (el) el.innerHTML = '<div style="padding:20px;color:#ff6b6b;font-family:sans-serif;font-size:14px;line-height:1.6">'
    + '⚠️ 앱 로딩 중 오류가 발생했습니다.<br/><br/>'
    + '<small style="color:#888">' + (e && e.message ? e.message : e) + '</small></div>';
}
