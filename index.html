<script>
/* window.storage 폴리필 — 일반 웹(GitHub Pages 등)에서는 localStorage로 영구 저장 */
(function(){
  if (window.storage) return;
  function lsKey(k, shared){ return (shared?"shared:":"user:") + k; }
  window.storage = {
    async get(key, shared){
      const v = localStorage.getItem(lsKey(key, shared));
      if (v === null) return null;
      return { key, value: v, shared: !!shared };
    },
    async set(key, value, shared){
      localStorage.setItem(lsKey(key, shared), value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared){
      localStorage.removeItem(lsKey(key, shared));
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared){
      const pfx = lsKey(prefix||"", shared);
      const keys = [];
      for (let i=0;i<localStorage.length;i++){
        const full = localStorage.key(i);
        if (full && full.startsWith(pfx)){
          keys.push(full.replace(shared?"shared:":"user:",""));
        }
      }
      return { keys, prefix, shared: !!shared };
    }
  };
})();
</script>

const PIPELINE_REPO_OWNER = "style2580n-droid";
const PIPELINE_REPO_NAME = "epl-management";
const PIPELINE_BRANCH = "main";

let _pipelineFetchPromise = null;
function fetchPipelineDataMultileague() {
  // 여러 리그를 빠르게 전환해도 fetch가 중복으로 나가지 않도록 Promise를 캐시한다.
  if (_pipelineFetchPromise) return _pipelineFetchPromise;
  _pipelineFetchPromise = (async () => {
    try {
      const url = `https://raw.githubusercontent.com/${PIPELINE_REPO_OWNER}/${PIPELINE_REPO_NAME}/${PIPELINE_BRANCH}/reports/app_data_multileague.js?t=${Date.now()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        console.warn("[pipeline] app_data_multileague.js 없음:", res.status);
        return false;
      }
      const text = await res.text();
      // 파일 내용이 이미 "window.PIPELINE_DATA_LALIGA = {...};" 형태의 실행 가능한
      // JS 문이라, EPL 앱처럼 구조분해할 필요 없이 그대로 실행만 하면 window에 붙는다.
      new Function(text)();
      return true;
    } catch (e) {
      console.warn("[pipeline] fetch 실패:", e);
      return false;
    }
  })();
  return _pipelineFetchPromise;
}

let SQUADS = {};     // { 팀명: [선수명, ...] } — app_export_multileague.py의 squads 필드

// ── 부상자/월드컵 피로도 (2026-07-15 추가, 데이터는 아직 파이프라인에서 안 옴 — 틀만 미리 준비) ──
// TEAM_INJURIES: EPL 앱의 SQUADS[team].keyOut/injured와 동일한 필드명·의미.
//   { 팀명: { keyOut: [선수명,...], injured: [선수명,...] } }
//   keyOut = 핵심 결장(주전급 장기이탈), injured = 로테이션 부상(경미)
// TEAM_FATIGUE: 월드컵 여독 — { 팀명: { fatigueScore: 0~1 } }. EPL 앱에도 fatigue 필드가
//   ELO 객체 안에 있지만 실제로 어디서도 안 쓰이고 있었음(빈 자리로만 존재) — 여기서는
//   실제로 computeLambdas에 연결해뒀다. 값이 없으면(신규 데이터 도착 전) 항상 무효과.
let TEAM_INJURIES = {};
let TEAM_FATIGUE = {};

// injuryLambdaAdjust: EPL 앱과 동일 공식 — keyOut 1명당 -6%, injured 1명당 -2%, 하한 -28%
function injuryLambdaAdjust(home, away) {
  function penalty(team) {
    const inj = TEAM_INJURIES[team];
    if (!inj) return 1;
    const keyOut = Array.isArray(inj.keyOut) ? inj.keyOut.length : 0;
    const injured = Array.isArray(inj.injured) ? inj.injured.length : 0;
    return Math.max(0.72, 1 - keyOut * 0.06 - injured * 0.02);
  }
  return { homeFactor: penalty(home), awayFactor: penalty(away) };
}

// fatigueLambdaAdjust: 월드컵 결승까지 많이 뛴 선수가 있는 팀은 시즌 초반 소폭 페널티.
// fatigueScore는 0(영향없음)~1(최대 피로) 범위로 파이프라인이 계산해서 줄 예정 — 최대 -10%.
function fatigueLambdaAdjust(team) {
  const f = TEAM_FATIGUE[team];
  const score = f && Number.isFinite(f.fatigueScore) ? Math.max(0, Math.min(1, f.fatigueScore)) : 0;
  return Math.max(0.90, 1 - score * 0.10);
}

let TEAM_XG = {};    // { 팀명: { xG, xGA } } — collect_xg_bsd.py의 teamXg 필드
                      // (24-25/25-26 시즌 평균, 26-27 신규 승격팀은 항목이 없을 수 있음 — 정상)

async function loadPipelineData(leagueKey) {
  try {
    await fetchPipelineDataMultileague();
    const globalKey = `PIPELINE_DATA_${leagueKey.toUpperCase()}`;
    const data = (typeof window !== "undefined") ? window[globalKey] : null;
    if (!data) return { scheduleLoaded:false, logosLoaded:false, squadsLoaded:false, xgLoaded:false, injuriesLoaded:false, fatigueLoaded:false };
    let scheduleLoaded = false, logosLoaded = false, squadsLoaded = false, xgLoaded = false, injuriesLoaded = false, fatigueLoaded = false;
    if (Array.isArray(data.schedule) && data.schedule.length) {
      SCHEDULE = data.schedule;
      scheduleLoaded = true;
    }
    if (data.logos && typeof data.logos === "object") {
      Object.assign(CLUB_LOGOS, data.logos);
      logosLoaded = true;
    }
    if (data.elo && typeof data.elo === "object") {
      Object.assign(ELO, data.elo);
    }
    if (data.squads && typeof data.squads === "object" && Object.keys(data.squads).length) {
      SQUADS = data.squads;
      squadsLoaded = true;
    }
    if (data.teamXg && typeof data.teamXg === "object" && Object.keys(data.teamXg).length) {
      TEAM_XG = data.teamXg;
      xgLoaded = true;
    }
    // 부상: { 팀명: { keyOut:[...], injured:[...] } } — 아직 파이프라인에 없어도 안전하게 통과
    if (data.injuries && typeof data.injuries === "object" && Object.keys(data.injuries).length) {
      TEAM_INJURIES = data.injuries;
      injuriesLoaded = true;
    }
    // 월드컵 여독: { 팀명: { fatigueScore: 0~1 } } — "조만간" 올라올 예정, 그 전까진 무효과
    if (data.fatigue && typeof data.fatigue === "object" && Object.keys(data.fatigue).length) {
      TEAM_FATIGUE = data.fatigue;
      fatigueLoaded = true;
    }
    return { scheduleLoaded, logosLoaded, squadsLoaded, xgLoaded, injuriesLoaded, fatigueLoaded };
  } catch (e) {
    return { scheduleLoaded:false, logosLoaded:false, squadsLoaded:false, xgLoaded:false, injuriesLoaded:false, fatigueLoaded:false };
  }
}

// getKickoffDate: SCHEDULE의 date(YYYY-MM-DD)+time(HH:MM, 파이프라인이 KST로 변환해서 줌)을
// 실제 Date 객체로 변환. "+09:00"을 명시해서 만들기 때문에, 이 앱을 보는 사람이 어느
// 시간대에 있든(내부적으로 Date는 UTC 절대시각을 저장하므로) 정확하게 비교된다.
function getKickoffDate(g) {
  if (!g || !g.date) return null;
  const time = g.time || "00:00";
  const dt = new Date(`${g.date}T${time}:00+09:00`);
  return isNaN(dt.getTime()) ? null : dt;
}

function normTeamStr(s) {
  return String(s || "").toLowerCase().normalize("NFKD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "");
}
function isSameClubName(leagueKey, koName, foreignName) {
  if (!foreignName) return false;
  const target = normTeamStr(foreignName);
  if (!target) return false;
  const en = ENGLISH_NAME[leagueKey]?.[koName];
  const alias = normTeamStr(en || koName);
  if (!alias) return false;
  return alias === target || target.includes(alias) || alias.includes(target);
}

function impliedProbFromOdds(odds) {
  if (typeof odds !== "number" || !isFinite(odds) || odds <= 1) return null;
  return 1 / odds;
}
function devigOdds(oddsObj) {
  if (!oddsObj) return null;
  const ih = impliedProbFromOdds(oddsObj.home), id = impliedProbFromOdds(oddsObj.draw), ia = impliedProbFromOdds(oddsObj.away);
  if (ih == null || id == null || ia == null) return null;
  const sum = ih + id + ia;
  if (!Number.isFinite(sum) || sum <= 0) return null;
  return { home: ih / sum, draw: id / sum, away: ia / sum }; // 마진 제거된 fair 확률
}
function computeEV(modelProb, fairOdds) {
  if (typeof modelProb !== "number" || !fairOdds || fairOdds <= 1) return null;
  return (modelProb * fairOdds) - 1; // 양수면 모델이 시장보다 이 결과를 더 유력하게 봄
}

const ODDS_API_IO_KEY = "demo"; // TODO: 실제 무료 키로 교체 필요 — odds-api.io에서 발급(카드 등록 불필요)

async function fetchMatchOdds(leagueKey, home, away) {
  try {
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 6000);
    const evUrl = `https://api.odds-api.io/v3/events?apiKey=${ODDS_API_IO_KEY}&sport=football&status=pending`;
    const res = await fetch(evUrl, { signal: controller.signal }).catch(() => null);
    clearTimeout(timer);
    if (!res || !res.ok) return null;
    const events = await res.json().catch(() => null);
    const list = Array.isArray(events) ? events : (Array.isArray(events?.data) ? events.data : null);
    if (!Array.isArray(list)) return null;

    const direct = list.find(ev => isSameClubName(leagueKey, home, ev.home) && isSameClubName(leagueKey, away, ev.away));
    const swapped = direct ? null : list.find(ev => isSameClubName(leagueKey, home, ev.away) && isSameClubName(leagueKey, away, ev.home));
    const match = direct || swapped;
    if (!match) return null;

    const oddsUrl = `https://api.odds-api.io/v3/odds?apiKey=${ODDS_API_IO_KEY}&eventId=${match.id}`;
    const oddsRes = await fetch(oddsUrl).catch(() => null);
    if (!oddsRes || !oddsRes.ok) return null;
    const oddsData = await oddsRes.json().catch(() => null);
    const bk = oddsData?.bookmakers?.[0] || oddsData?.data?.bookmakers?.[0];
    const markets = bk?.markets || bk?.odds || [];
    const h2h = Array.isArray(markets) ? markets.find(m => m.key === "h2h" || m.name === "1X2") : null;
    if (!h2h || !Array.isArray(h2h.outcomes)) return null;
    const oh = h2h.outcomes.find(o => isSameClubName(leagueKey, home, o.name))?.price;
    const od = h2h.outcomes.find(o => /^draw$/i.test(o.name || ""))?.price;
    const oa = h2h.outcomes.find(o => isSameClubName(leagueKey, away, o.name))?.price;
    if (!oh || !od || !oa) return null;
    return { home: oh, draw: od, away: oa, source: "odds-api.io" };
  } catch (e) {
    return null;
  }
}

// ============================================================ 예측 엔진 v2 (EPL 앱에서 검증된 순수 함수 이식)
// EPL 앱의 expScore/calcDrawProb/poissonRandom/computeOverUnder/computeMarketStats는
// 다른 데이터(xG·부상·ML모델 등)에 의존하지 않는 순수 함수라 100% 안전하게 그대로 이식했다.
// (Node로 극단적 케이스까지 별도 수치 검증 완료: 확률 합 항상 1, 음수/NaN 없음)
//
// 아직 이식 안 한 것 (데이터가 없어서 이식하면 오작동/무의미한 값이 나오는 부분):
//  - randomForestWinProb(ML 앙상블) — EPL 데이터로 학습된 모델, 다른 리그에 안 맞음
//  - injuryLambdaAdjust/formLambdaAdjust — 실제 부상자/최근결과 데이터 필요
//  - psxgLambdaAdjust/setPieceLambdaAdjust/starPlayerLambdaBoost — 선수 단위 세부스탯 필요
//  - isRivalry — 리그별 라이벌 관계 데이터 필요 (현재 전부 false)
//  - calibrateProbTriple — EPL 실제 결과로 튜닝된 곡선, 다른 리그엔 안 맞음
function expScore(ra, rb) {
  return 1 / (1 + Math.pow(10, (rb - ra) / 400));
}
function calcDrawProb(eloDiff) {
  const base = 0.27;
  const closeness = Math.max(0, 1 - Math.abs(eloDiff) / 500);
  return Math.min(0.34, Math.max(0.16, base + closeness * 0.07));
}
function poissonRandom(lambda) {
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}

function computeOverUnder(scoreCounts, totalSims) {
  const lines = [2.5, 3.5];
  const result = {};
  for (const line of lines) {
    let over = 0;
    for (const [score, count] of Object.entries(scoreCounts)) {
      const [h, a] = score.split("-").map(Number);
      if ((h + a) > line) over += count;
    }
    result[line] = { over: over / totalSims, under: 1 - over / totalSims };
  }
  return result;
}

function computeMarketStats(scoreCounts, totalSims) {
  let bttsYes = 0, homeCS = 0, awayCS = 0;
  const exactDist = Object.entries(scoreCounts)
    .map(([score, count]) => ({ score, prob: count / totalSims }))
    .sort((a, b) => b.prob - a.prob);
  for (const [score, count] of Object.entries(scoreCounts)) {
    const [h, a] = score.split("-").map(Number);
    if (h >= 1 && a >= 1) bttsYes += count;
    if (a === 0) homeCS += count;
    if (h === 0) awayCS += count;
  }
  const p = (x) => x / totalSims;
  return {
    btts: { yes: p(bttsYes), no: 1 - p(bttsYes) },
    cleanSheet: { home: p(homeCS), away: p(awayCS) },
    exactDist: exactDist.slice(0, 5),
  };
}

// 리그별 실제 2025-26 시즌 경기당 평균 득점 (soccerstats.com / sportstats365.com 확인)
// 라리가·분데스리가는 홈/원정 분리 데이터까지 실측(soccerstats.com). 나머지 4개 리그는
// 홈/원정 분리 데이터를 못 구해서, 확인된 두 리그의 평균 홈 득점 비중(56.7%)을 적용한 추정치.
const LEAGUE_LAMBDA = {
  laliga:       { home: 1.57, away: 1.11 }, // 실측: soccerstats.com 2025-26
  bundesliga:   { home: 1.78, away: 1.46 }, // 실측: soccerstats.com 2025-26

  eredivisie:   { home: 1.80, away: 1.38 }, // 추정 (총 3.18골/경기, sportstats365)
  championship: { home: 1.48, away: 1.13 }, // 추정 (총 2.61골/경기, sportstats365)
};

// computeLambdas: Elo+리그평균+xG블렌딩+라이벌보정으로 홈/원정 득점 기댓값(λ)을 계산.
// predictMatchV2(개별 경기 예측)와 simulateSeason(시즌 전체 시뮬레이션)이 동일 로직을 공유—
// 두 군데서 따로 구현하면 나중에 한쪽만 고치고 다른 쪽을 안 고치는 실수가 생기기 쉬워서 분리함.
function computeLambdas(leagueKey, homeName, awayName) {
  const homeElo = (ELO[homeName] ?? 1500) + HOME_ADV;
  const awayElo = (ELO[awayName] ?? 1500);
  const eloDiff = homeElo - awayElo;
  const eloLambdaFactor = Math.max(-0.35, Math.min(0.35, eloDiff / 200 * 0.18));
  const lgBase = LEAGUE_LAMBDA[leagueKey] || LEAGUE_LAMBDA.laliga;
  let lambdaHome = Math.max(0.15, lgBase.home * (1 + eloLambdaFactor));
  let lambdaAway = Math.max(0.15, lgBase.away * (1 - eloLambdaFactor));

  // xG 블렌딩 — TEAM_XG는 24-25/25-26 시즌 평균 xG(공격)/xGA(수비)다. 26-27 신규
  // 승격팀은 상위리그 xG 기록 자체가 없어서 TEAM_XG에 항목이 없을 수 있다 — 그 경우
  // 이 블록을 건너뛰고 기존 ELO 전용 람다를 그대로 쓴다(항상 안전한 폴백 유지).
  const homeXg = TEAM_XG[homeName], awayXg = TEAM_XG[awayName];
  let xgBlended = false;
  if (homeXg && awayXg &&
      Number.isFinite(homeXg.xG) && Number.isFinite(homeXg.xGA) &&
      Number.isFinite(awayXg.xG) && Number.isFinite(awayXg.xGA)) {
    const xgLambdaHome = Math.max(0.15, (homeXg.xG + awayXg.xGA) / 2);
    const xgLambdaAway = Math.max(0.15, (awayXg.xG + homeXg.xGA) / 2);
    const XG_WEIGHT = 0.3;
    lambdaHome = lambdaHome * (1 - XG_WEIGHT) + xgLambdaHome * XG_WEIGHT;
    lambdaAway = lambdaAway * (1 - XG_WEIGHT) + xgLambdaAway * XG_WEIGHT;
    xgBlended = true;
  }

  // 더비/라이벌 매치: λ를 평균 쪽으로 8% 수렴시켜 접전 스코어 유도 (EPL 앱과 동일 공식)
  const rivalry = isRivalry(leagueKey, homeName, awayName);
  if (rivalry) {
    const mid = (lambdaHome + lambdaAway) / 2;
    lambdaHome = lambdaHome * 0.92 + mid * 0.08;
    lambdaAway = lambdaAway * 0.92 + mid * 0.08;
  }

  // 부상자 보정 (TEAM_INJURIES 비어있으면 factor=1, 즉 무효과)
  const inj = injuryLambdaAdjust(homeName, awayName);
  lambdaHome = Math.max(0.15, lambdaHome * inj.homeFactor);
  lambdaAway = Math.max(0.15, lambdaAway * inj.awayFactor);

  // 월드컵 여독 보정 (TEAM_FATIGUE 비어있으면 factor=1, 즉 무효과)
  lambdaHome = Math.max(0.15, lambdaHome * fatigueLambdaAdjust(homeName));
  lambdaAway = Math.max(0.15, lambdaAway * fatigueLambdaAdjust(awayName));

  return { lambdaHome, lambdaAway, eloDiff, xgBlended, rivalry,
    injuryApplied: inj.homeFactor < 1 || inj.awayFactor < 1,
    fatigueApplied: (TEAM_FATIGUE[homeName]?.fatigueScore > 0) || (TEAM_FATIGUE[awayName]?.fatigueScore > 0) };
}


function predictMatchV2(leagueKey, homeName, awayName, sims = 100000) {
  const homeElo = (ELO[homeName] ?? 1500) + HOME_ADV;
  const awayElo = (ELO[awayName] ?? 1500);
  const eloDiff = homeElo - awayElo;

  const winProbRaw = expScore(homeElo, awayElo);
  const drawProbRaw = calcDrawProb(eloDiff);
  let homeWinProb = winProbRaw * (1 - drawProbRaw);
  let awayWinProb = (1 - winProbRaw) * (1 - drawProbRaw);
  let drawProb = drawProbRaw;

  const { lambdaHome, lambdaAway, xgBlended, rivalry, injuryApplied, fatigueApplied } = computeLambdas(leagueKey, homeName, awayName);

  // 더비/라이벌 매치: 전력차 완화 + 무승부 확률 상승(EPL 앱과 동일 공식, λ 수렴은 computeLambdas에서 이미 처리됨)
  if (rivalry) {
    const favComp = 0.90; // 승패 확률을 10% 무승부 쪽으로 압축
    homeWinProb *= favComp;
    awayWinProb *= favComp;
    drawProb = Math.max(0.02, 1 - homeWinProb - awayWinProb);
  }

  const safeSims = Number.isFinite(sims) && sims > 0 ? Math.floor(sims) : 100000;
  let hw = 0, dr = 0, aw = 0;
  const scoreCounts = {};
  for (let i = 0; i < safeSims; i++) {
    const hg = poissonRandom(lambdaHome);
    const ag = poissonRandom(lambdaAway);
    if (hg > ag) hw++; else if (hg < ag) aw++; else dr++;
    const key = `${hg}-${ag}`;
    scoreCounts[key] = (scoreCounts[key] || 0) + 1;
  }
  const mcHome = hw / safeSims, mcDraw = dr / safeSims, mcAway = aw / safeSims;
  let finalHome = (homeWinProb + mcHome) / 2;
  let finalDraw = (drawProb + mcDraw) / 2;
  let finalAway = (awayWinProb + mcAway) / 2;
  const total = finalHome + finalDraw + finalAway;
  finalHome /= total; finalDraw /= total; finalAway /= total;

  const topScores = Object.entries(scoreCounts)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 5)
    .map(([score, count]) => ({ score, prob: count / safeSims }));

  return {
    home: homeName, away: awayName,
    homeWinProb: finalHome, drawProb: finalDraw, awayWinProb: finalAway,
    eloOnly: { homeWinProb, drawProb, awayWinProb },
    monteCarlo: { homeWinProb: mcHome, drawProb: mcDraw, awayWinProb: mcAway },
    lambdaHome, lambdaAway, eloDiff,
    xgBlended,  // true면 이 경기는 실제 xG 데이터가 반영된 예측 (2026-07-15 추가)
    rivalry,    // true면 더비/라이벌 매치 보정이 적용된 예측
    injuryApplied,  // true면 부상자 데이터가 반영된 예측 (데이터 도착 전엔 항상 false)
    fatigueApplied, // true면 월드컵 여독 데이터가 반영된 예측 (데이터 도착 전엔 항상 false)
    topScores,
    overUnder: computeOverUnder(scoreCounts, safeSims),
    marketStats: computeMarketStats(scoreCounts, safeSims),
    sims: safeSims,
  };
}

// 리그별 강등권 크기 (근사치 — 리그앙/에레디비시/챔피언십처럼 플레이오프가 얽힌 경우도
// 있어서 정확한 승강 규정과 100% 일치하진 않음. "하위권 위험도" 참고용으로만 표시)
const RELEGATION_ZONE = {
  laliga: 3, bundesliga: 2, seriea: 3, ligue1: 2, eredivisie: 2, championship: 3,
};

// simulateSeason: 실제 SCHEDULE(전체 시즌 일정)을 몬테카를로로 N번 통째로 돌려서
// 팀별 우승 확률·강등권 확률을 추정. 개별 경기 예측(predictMatchV2)과 같은 λ 계산
// (computeLambdas)을 공유하기 때문에 결과가 서로 어긋나지 않는다.
// SCHEDULE에 없는 팀명이 fixture에 섞여 있으면(파이프라인 데이터 오류 대비) 그 경기는
// 조용히 건너뛴다 — 시즌 시뮬레이션 전체가 깨지는 것보다 안전.
function simulateSeason(leagueKey, sims = 500) {
  const teams = LEAGUES[leagueKey].teams;
  if (!SCHEDULE.length) return null;

  const titleCount = {}, relegationCount = {};
  teams.forEach(t => { titleCount[t] = 0; relegationCount[t] = 0; });
  const zoneSize = RELEGATION_ZONE[leagueKey] ?? 3;
  const safeSims = Number.isFinite(sims) && sims > 0 ? Math.floor(sims) : 500;
  let validFixtures = 0;

  for (let s = 0; s < safeSims; s++) {
    const points = {}, gf = {}, ga = {};
    teams.forEach(t => { points[t] = 0; gf[t] = 0; ga[t] = 0; });

    for (const fixture of SCHEDULE) {
      const { home, away } = fixture || {};
      if (!points.hasOwnProperty(home) || !points.hasOwnProperty(away)) continue;
      if (s === 0) validFixtures++;
      const { lambdaHome, lambdaAway } = computeLambdas(leagueKey, home, away);
      const hg = poissonRandom(lambdaHome), ag = poissonRandom(lambdaAway);
      gf[home] += hg; ga[home] += ag; gf[away] += ag; ga[away] += hg;
      if (hg > ag) points[home] += 3;
      else if (hg < ag) points[away] += 3;
      else { points[home] += 1; points[away] += 1; }
    }

    const table = teams.slice().sort((a, b) => {
      if (points[b] !== points[a]) return points[b] - points[a];
      return (gf[b] - ga[b]) - (gf[a] - ga[a]); // 골득실 타이브레이커
    });
    titleCount[table[0]]++;
    for (let i = teams.length - zoneSize; i < teams.length; i++) relegationCount[table[i]]++;
  }

  return {
    zoneSize,
    validFixtures,
    totalFixtures: SCHEDULE.length,
    table: teams.map(t => ({
      team: t,
      titleProb: titleCount[t] / safeSims,
      relegationProb: relegationCount[t] / safeSims,
    })).sort((a, b) => b.titleProb - a.titleProb || b.relegationProb - a.relegationProb),
  };
}

// ============================================================ 팀 스타일 레이더 (EPL 앱 RadarChart 순수 SVG 로직 그대로 이식)
// EPL 앱은 xG/xGA/압박강도/필드틸트/세트피스/최근폼 6축을 쓰지만, 우리는 지금
// xG/xGA/ELO 3개 데이터만 있어서 3축으로 축소했다. 다른 축은 해당 데이터(PPDA,
// 필드틸트, 폼 등)가 파이프라인에 들어오면 그때 추가하면 된다.
const RADAR_AXES = ["공격(xG)", "수비", "ELO"];

function getTeamRadarProfile(leagueKey, team) {
  const teams = LEAGUES[leagueKey].teams;
  const raw = {};
  for (const t of teams) {
    const xg = TEAM_XG[t];
    const xG = xg && Number.isFinite(xg.xG) ? xg.xG : 1.35;
    const xGA = xg && Number.isFinite(xg.xGA) ? xg.xGA : 1.35;
    raw[t] = { "공격(xG)": xG, "수비": -xGA, "ELO": ELO[t] ?? 1500 };
  }
  const norm = {};
  teams.forEach(t => { norm[t] = {}; });
  for (const ax of RADAR_AXES) {
    const vals = teams.map(t => raw[t][ax]);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = max - min;
    for (const t of teams) norm[t][ax] = range > 1e-9 ? ((raw[t][ax] - min) / range) * 100 : 50;
  }
  return { raw: raw[team], norm: norm[team] };
}

function RadarChart({ axes, series, size = 220 }) {
  const center = size / 2;
  const radius = size / 2 - 40;
  const labelRadius = radius + 22;
  const angleStep = (Math.PI * 2) / axes.length;
  const ptAt = (value, i, r = radius) => {
    const angle = -Math.PI / 2 + i * angleStep;
    const rr = (value / 100) * r;
    return [center + rr * Math.cos(angle), center + rr * Math.sin(angle)];
  };
  const gridLevels = [20, 40, 60, 80, 100];
  return (
    <svg width={size} height={size} style={{display:"block", margin:"0 auto"}}>
      {gridLevels.map(lvl => (
        <polygon key={lvl} points={axes.map((_, i) => ptAt(lvl, i).join(",")).join(" ")}
          fill="none" stroke={T.border} strokeWidth={1}/>
      ))}
      {axes.map((_, i) => {
        const [x, y] = ptAt(100, i);
        return <line key={i} x1={center} y1={center} x2={x} y2={y} stroke={T.border} strokeWidth={1}/>;
      })}
      {series.map((s, si) => (
        <polygon key={si} points={s.values.map((v, i) => ptAt(v, i).join(",")).join(" ")}
          fill={s.color} fillOpacity={0.22} stroke={s.color} strokeWidth={2}/>
      ))}
      {axes.map((label, i) => {
        const angle = -Math.PI / 2 + i * angleStep;
        const x = center + labelRadius * Math.cos(angle);
        const y = center + labelRadius * Math.sin(angle);
        return (
          <text key={i} x={x} y={y} fill={T.muted} fontSize={10} fontWeight={700}
            textAnchor="middle" dominantBaseline="middle">{label}</text>
        );
      })}
    </svg>
  );
}

    </Card>
  );
}

// computeStandingsTable: SCHEDULE의 각 fixture에 homeGoals/awayGoals(둘 다 유효한 숫자)가
// 있으면 "치른 경기"로 간주해서 승점·득실차를 계산한다. 아직 스코어가 없는 fixture(대부분,
// 시즌 시작 전)는 조용히 건너뛴다 — 이게 안전한 이유는, 필드가 아예 없거나 값이 이상해도
// (문자열, null 등) Number.isFinite로 걸러지기 때문에 앱이 죽거나 잘못된 승점이 찍히지 않음.
// 정렬: 승점desc → 골득실desc → 다득점desc → (전부 동률이면) ELOdesc — 실제 EPL 앱의
// calcGroupStandings와 동일한 타이브레이커 순서.
function computeStandingsTable(leagueKey) {
  const teams = LEAGUES[leagueKey].teams;
  const table = {};
  teams.forEach(t => { table[t] = { team: t, elo: ELO[t] ?? 1500, p: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0, pts: 0 }; });

  let playedCount = 0;
  for (const fixture of SCHEDULE) {
    const { home, away, homeGoals, awayGoals } = fixture || {};
    if (!table[home] || !table[away]) continue;
    if (!Number.isFinite(homeGoals) || !Number.isFinite(awayGoals)) continue; // 아직 안 치른 경기
    playedCount++;
    const h = table[home], a = table[away];
    h.p++; a.p++;
    h.gf += homeGoals; h.ga += awayGoals;
    a.gf += awayGoals; a.ga += homeGoals;
    if (homeGoals > awayGoals) { h.w++; a.l++; h.pts += 3; }
    else if (homeGoals < awayGoals) { a.w++; h.l++; a.pts += 3; }
    else { h.d++; a.d++; h.pts += 1; a.pts += 1; }
  }

  const rows = Object.values(table).map(r => ({ ...r, gd: r.gf - r.ga }));
  rows.sort((x, y) =>
    (y.pts - x.pts) || (y.gd - x.gd) || (y.gf - x.gf) || (y.elo - x.elo)
  );
  return { rows, playedCount };
}

// computeAccuracyMetrics: EPL 앱에서 그대로 이식 (순수 함수, history 데이터 구조가 동일해서
// 필드명 하나도 안 바꾸고 재사용 가능). 정산된(settled) 예측만으로 브라이어 스코어와
// 확신도 구간별(0-10%, 10-20%...) 실제 적중률(캘리브레이션)을 계산한다.
function computeAccuracyMetrics(entries) {
  const valid = (entries || []).filter(h => h && h.settled
    && h.actualHome != null && h.actualAway != null
    && typeof h.homeWinProb === "number" && typeof h.drawProb === "number" && typeof h.awayWinProb === "number");
  if (!valid.length) return null;

  let brierSum = 0;
  let dirHits = 0, exactHits = 0;
  const buckets = Array.from({length:10}, () => ({count:0, hits:0, confSum:0}));

  for (const h of valid) {
    const actual = h.actualHome > h.actualAway ? "home" : (h.actualHome < h.actualAway ? "away" : "draw");
    const oh = actual === "home" ? 1 : 0, od = actual === "draw" ? 1 : 0, oa = actual === "away" ? 1 : 0;
    const ph = h.homeWinProb, pd = h.drawProb, pa = h.awayWinProb;
    brierSum += (ph-oh)*(ph-oh) + (pd-od)*(pd-od) + (pa-oa)*(pa-oa);

    const predicted = (ph >= pd && ph >= pa) ? "home" : ((pa >= pd && pa >= ph) ? "away" : "draw");
    const confidence = Math.max(ph, pd, pa);
    if (predicted === actual) dirHits++;

    const [predH, predA] = h.topScore ? h.topScore.split("-").map(Number) : [null, null];
    if (predH === h.actualHome && predA === h.actualAway) exactHits++;

    const bIdx = Math.min(9, Math.max(0, Math.floor(confidence*10)));
    buckets[bIdx].count++;
    buckets[bIdx].confSum += confidence;
    if (predicted === actual) buckets[bIdx].hits++;
  }

  return {
    n: valid.length,
    brierScore: brierSum / valid.length,
    dirHitRate: dirHits / valid.length,
    exactHitRate: exactHits / valid.length,
    buckets: buckets.map((b, i) => ({
      range: `${i*10}–${(i+1)*10}%`,
      count: b.count,
      avgConfidence: b.count ? b.confSum / b.count : null,
      actualHitRate: b.count ? b.hits / b.count : null,
    })).filter(b => b.count > 0),
  };
}

function HistoryTab({ leagueKey }) {
  const [history, setHistory] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [settleInputs, setSettleInputs] = useState({}); // id -> {h,a}

  const storageKey = `wc:history:${leagueKey}`;

  const load = useCallback(async () => {
    try {
      const saved = await window.storage.get(storageKey);
      setHistory(saved && saved.value ? JSON.parse(saved.value) : []);
    } catch (e) {
      setHistory([]);
    }
    setLoaded(true);
  }, [storageKey]);

  useEffect(() => { setLoaded(false); load(); }, [leagueKey, load]);

  const persist = async (list) => {
    setHistory(list);
    try { await window.storage.set(storageKey, JSON.stringify(list)); } catch (e) {}
  };

  const settle = async (id) => {
    const input = settleInputs[id];
    if (!input || input.h === "" || input.a === "") return;
    const h = Number(input.h), a = Number(input.a);
    if (!Number.isFinite(h) || !Number.isFinite(a) || h < 0 || a < 0) return;
    const list = history.map(entry => entry.id === id
      ? { ...entry, settled: true, actualHome: h, actualAway: a }
      : entry);
    await persist(list);
  };

  const removeEntry = async (id) => {
    await persist(history.filter(entry => entry.id !== id));
  };

  const clearAll = async () => {
    await persist([]);
  };

  if (!loaded) return <Card><div style={{textAlign:"center", color:T.muted, fontSize:13}}>불러오는 중...</div></Card>;

  const settled = history.filter(h => h.settled);
  const dirHits = settled.filter(h => {
    const predicted = h.homeWinProb > h.awayWinProb ? (h.homeWinProb > h.drawProb ? "home" : "draw") : (h.awayWinProb > h.drawProb ? "away" : "draw");
    const actual = h.actualHome > h.actualAway ? "home" : (h.actualHome < h.actualAway ? "away" : "draw");
    return predicted === actual;
  }).length;
  const exactHits = settled.filter(h => h.topScore === `${h.actualHome}-${h.actualAway}`).length;

  return (
    <div>
      <Card>
        <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:6, textAlign:"center"}}>
          <div><div style={{fontSize:18, fontWeight:800, color:T.text}}>{history.length}</div><div style={{fontSize:10, color:T.muted}}>저장</div></div>
          <div><div style={{fontSize:18, fontWeight:800, color:T.muted}}>{history.length - settled.length}</div><div style={{fontSize:10, color:T.muted}}>미정산</div></div>
          <div><div style={{fontSize:18, fontWeight:800, color:T.cyan}}>{dirHits}/{settled.length}</div><div style={{fontSize:10, color:T.muted}}>방향적중</div></div>
          <div><div style={{fontSize:18, fontWeight:800, color:T.green}}>{exactHits}/{settled.length}</div><div style={{fontSize:10, color:T.muted}}>스코어적중</div></div>
        </div>
        {settled.length > 0 && (
          <div style={{marginTop:8, padding:"6px 0", borderTop:`1px solid ${T.border}`, textAlign:"center"}}>
            <span style={{fontSize:11, color:T.muted}}>방향 적중률 </span>
            <span style={{fontSize:14, fontWeight:800, color:T.accent}}>{(dirHits/settled.length*100).toFixed(0)}%</span>
          </div>
        )}
      </Card>

      <AccuracyPanel history={history}/>

      {history.length === 0 ? (
        <Card>
          <div style={{textAlign:"center", padding:"16px 8px", color:T.muted, fontSize:12.5}}>
            아직 저장된 예측이 없습니다. 예측 탭에서 "이 예측 기록에 저장"을 눌러보세요.
          </div>
        </Card>
      ) : (
        <React.Fragment>
          {history.map(h => (
            <Card key={h.id} style={{marginBottom:8}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6}}>
                <span style={{fontSize:13, color:T.text, fontWeight:700}}>{h.home} vs {h.away}</span>
                <button onClick={()=>removeEntry(h.id)} style={{background:"none", border:"none", color:T.dim, fontSize:11, cursor:"pointer"}}>삭제</button>
              </div>
              <div style={{fontSize:11, color:T.muted, marginBottom:6}}>
                예측: {h.home} {(h.homeWinProb*100).toFixed(0)}% · 무 {(h.drawProb*100).toFixed(0)}% · {h.away} {(h.awayWinProb*100).toFixed(0)}%
                {h.topScore && ` · 예상 ${h.topScore}`}
              </div>
              {h.settled ? (
                <div style={{fontSize:12, color:T.green, fontWeight:700}}>
                  ✅ 실제 결과: {h.actualHome}-{h.actualAway}
                </div>
              ) : (
                <div style={{display:"flex", gap:6, alignItems:"center"}}>
                  <input type="number" min="0" placeholder="홈" value={settleInputs[h.id]?.h ?? ""}
                    onChange={e => setSettleInputs(s => ({ ...s, [h.id]: { ...s[h.id], h: e.target.value } }))}
                    style={{width:50, background:T.surface, border:`1px solid ${T.border}`, color:T.text, borderRadius:6, padding:"5px 6px", fontSize:12}}/>
                  <span style={{color:T.muted}}>:</span>
                  <input type="number" min="0" placeholder="원정" value={settleInputs[h.id]?.a ?? ""}
                    onChange={e => setSettleInputs(s => ({ ...s, [h.id]: { ...s[h.id], a: e.target.value } }))}
                    style={{width:50, background:T.surface, border:`1px solid ${T.border}`, color:T.text, borderRadius:6, padding:"5px 6px", fontSize:12}}/>
                  <button onClick={()=>settle(h.id)}
                    style={{flex:1, padding:"6px 0", borderRadius:6, border:"none", background:T.accent, color:"#fff", fontSize:11.5, fontWeight:700, cursor:"pointer"}}>
                    결과 입력해서 정산
                  </button>
                </div>
              )}
            </Card>
          ))}
          <button onClick={clearAll}
            style={{width:"100%", padding:"9px 0", borderRadius:10, border:`1px solid ${T.border}`, background:"transparent", color:T.dim, fontSize:11.5, cursor:"pointer"}}>
            전체 기록 삭제
          </button>
        </React.Fragment>
      )}
    </div>
  );
}

  { id:"standings", label:"리그순위" },

  { id:"schedule", label:"일정" },
  { id:"squads", label:"👥 스쿼드" },
  { id:"history", label:"📝 기록" },
  { id:"settings", label:"⚙️ 설정" },

function App() {
  const [leagueKey, setLeagueKey] = useState("laliga");
  const [leagueVersion, setLeagueVersion] = useState(0);
  const [tab, setTab] = useState("predict");
  const [ready, setReady] = useState(false);
  const [pipelineStatus, setPipelineStatus] = useState(null); // null=확인중, true=연결됨, false=미연결
  const [favorites, setFavorites] = useState([]); // 현재 리그의 즐겨찾기 팀 목록
  const [notifyEnabled, setNotifyEnabled] = useState(false);
  const notifiedRef = useRef(new Set()); // "홈_원정_날짜_시각_30" 같은 키로 중복 알림 방지
  const [themeMode, setThemeMode] = useState("dark");
  const [themeTick, setThemeTick] = useState(0); // 시스템 모드일 때 OS 설정 변경 감지용 강제 리렌더

  useEffect(() => {
    (async () => {
      let mode = "dark";
      try {
        const r = await window.storage.get("wc:themeMode", false);
        if (r?.value === "light" || r?.value === "dark" || r?.value === "system") mode = r.value;
      } catch (e) {}
      applyTheme(mode);
      setThemeMode(mode);
    })();
  }, []);

  // 시스템 모드일 때 OS 다크/라이트 설정이 바뀌면 실시간 반영
  useEffect(() => {
    if (themeMode !== "system" || typeof window === "undefined" || !window.matchMedia) return;
    const mq = window.matchMedia("(prefers-color-scheme: dark)");
    const handler = () => { applyTheme("system"); setThemeTick(v => v + 1); };
    try { mq.addEventListener("change", handler); } catch (e) { mq.addListener && mq.addListener(handler); }
    return () => { try { mq.removeEventListener("change", handler); } catch (e) { mq.removeListener && mq.removeListener(handler); } };
  }, [themeMode]);

  const changeTheme = useCallback((mode) => {
    applyTheme(mode);
    setThemeMode(mode);
    window.storage.set("wc:themeMode", mode, false).catch(() => {});
  }, []);

  useEffect(() => {
    (async () => {
      try {
        const saved = await window.storage.get("wc:notifyEnabled", false);
        setNotifyEnabled(saved && saved.value === "1");
      } catch (e) {}
    })();
  }, []);

  const toggleNotify = useCallback(async (checked) => {
    if (checked && typeof Notification !== "undefined" && Notification.permission === "default") {
      try { await Notification.requestPermission(); } catch (e) {}
    }
    setNotifyEnabled(checked);
    window.storage.set("wc:notifyEnabled", checked ? "1" : "0").catch(() => {});
  }, []);

  // 킥오프 알림 — 현재 리그의 SCHEDULE + favorites만 대상으로 30초마다 확인한다.
  // (이 앱은 리그를 전환하면 그 리그 데이터만 메모리에 있으므로, 지금 열어둔 리그
  // 탭의 즐겨찾기 경기만 알림 대상이 됨 — EPL 앱과 동일하게 "이 탭이 열려있는 동안만" 동작)
  useEffect(() => {
    if (!notifyEnabled) return;
    if (typeof Notification === "undefined" || Notification.permission !== "granted") return;

    const check = () => {
      const now = Date.now();
      for (const g of SCHEDULE) {
        if (!favorites.includes(g.home) && !favorites.includes(g.away)) continue;
        const kickoff = getKickoffDate(g);
        if (!kickoff) continue;
        const minsLeft = (kickoff.getTime() - now) / 60000;
        for (const threshold of [30, 10]) {
          const key = `${g.home}_${g.away}_${g.date}_${g.time}_${threshold}`;
          if (minsLeft <= threshold && minsLeft > threshold - 1 && !notifiedRef.current.has(key)) {
            notifiedRef.current.add(key);
            try {
              new Notification(`⚽ ${threshold}분 후 킥오프`, { body: `${g.home} vs ${g.away}` });
            } catch (e) {}
          }
        }
      }
    };
    check();
    const timer = setInterval(check, 30000);
    return () => clearInterval(timer);
  }, [notifyEnabled, favorites, leagueVersion]);

  useEffect(() => {
    (async () => {
      // 리그별 저장된 동적 ELO가 있으면 불러오고, 없으면 1500 기본값 시드 유지
      switchLeagueData(leagueKey);
      try {
        const saved = await window.storage.get(`wc:elo:${leagueKey}`);
        if (saved && saved.value) {
          const parsed = JSON.parse(saved.value);
          Object.assign(ELO, parsed);
        }
      } catch (e) {}
      try {
        const favSaved = await window.storage.get(`wc:favorites:${leagueKey}`);
        setFavorites(favSaved && favSaved.value ? JSON.parse(favSaved.value) : []);
      } catch (e) {
        setFavorites([]);
      }
      // 파이프라인이 아직 없으면 scheduleLoaded/logosLoaded 둘 다 false로 조용히 반환됨 (오류 아님)
      const { scheduleLoaded, logosLoaded } = await loadPipelineData(leagueKey);
      setPipelineStatus(scheduleLoaded || logosLoaded);
      setLeagueVersion(v => v + 1);
      setReady(true);
    })();
  }, [leagueKey]);

  const toggleFavorite = useCallback(async (team) => {
    setFavorites(prev => {
      const next = prev.includes(team) ? prev.filter(t => t !== team) : [...prev, team];
      window.storage.set(`wc:favorites:${leagueKey}`, JSON.stringify(next)).catch(() => {});
      return next;
    });
  }, [leagueKey]);

  const onSelectLeague = useCallback((k) => {
    if (k === leagueKey) return;
    setReady(false);
    setLeagueKey(k);
    setTab("predict");
  }, [leagueKey]);

  const forceRefresh = useCallback(() => setLeagueVersion(v => v + 1), []);

  return (
    <div style={{maxWidth:520, margin:"0 auto", minHeight:"100vh", paddingBottom:30}}>
      <div style={{padding:"18px 14px 10px", textAlign:"center"}}>
        <div style={{fontSize:19, fontWeight:900, color:T.text}}>⚽ 유럽 6대리그 예측기 <span style={{fontSize:12.5, color:T.cyan, fontWeight:600}}>v0.1</span></div>
        <div style={{fontSize:11, color:T.muted, marginTop:3}}>
          라리가 · 분데스리가 · 세리에A · 리그앙 · 에레디비시 · 챔피언십
        </div>
      </div>

      <LeaguePicker leagueKey={leagueKey} onChange={onSelectLeague}/>

      <div style={{display:"flex", overflowX:"auto", gap:6, padding:"0 12px 10px", borderBottom:`1px solid ${T.border}`}}>
        {TABS.map(t => (
          <button key={t.id} onClick={()=>setTab(t.id)}
            style={{flex:"0 0 auto", padding:"8px 14px", borderRadius:20, border:"none", cursor:"pointer",
                    fontSize:13, fontWeight:700, whiteSpace:"nowrap",
                    background: tab===t.id ? T.accent : T.surface,
                    color: tab===t.id ? "#fff" : T.muted}}>
            {t.label}
          </button>
        ))}
      </div>

      <div style={{padding:"12px 12px 0"}}>
        {!ready ? (
          <Card><div style={{textAlign:"center", color:T.muted, fontSize:13}}>불러오는 중...</div></Card>
        ) : (
          <React.Fragment key={leagueVersion}>
            {tab === "predict" && <PredictTab leagueKey={leagueKey}/>}
            {tab === "teams" && <TeamListTab leagueKey={leagueKey} favorites={favorites} onToggleFavorite={toggleFavorite}/>}
            {tab === "ranking" && <RankingTab leagueKey={leagueKey}/>}
            {tab === "schedule" && <ScheduleTab leagueKey={leagueKey}/>}
            {tab === "squads" && <SquadTab leagueKey={leagueKey}/>}
            {tab === "standings" && <StandingsTab leagueKey={leagueKey}/>}
            {tab === "settings" && <SettingsTab leagueKey={leagueKey} favorites={favorites} onToggleFavorite={toggleFavorite} onDataReset={forceRefresh} notifyEnabled={notifyEnabled} onToggleNotify={toggleNotify} themeMode={themeMode} onChangeTheme={changeTheme}/>}
            {tab === "outlook" && <SeasonOutlookTab leagueKey={leagueKey}/>}
            {tab === "history" && <HistoryTab leagueKey={leagueKey}/>}
          </React.Fragment>
        )}
      </div>

      <div style={{textAlign:"center", marginTop:24, fontSize:10, color:T.dim, padding:"0 20px"}}>
        {pipelineStatus === null ? (
          <span>⏳ 파이프라인 연결 확인 중...</span>
        ) : pipelineStatus ? (
          <span style={{color:T.green}}>✅ 파이프라인 연결됨 — 이 리그는 실데이터 적용됨</span>
        ) : (
          <span>⚠️ 파이프라인 미연결 — 아직 스켈레톤(ELO 1500 기본값)입니다</span>
        )}
        <br/>다음 단계: 로고 매핑 → 예측 엔진 고도화
      </div>
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props){ super(props); this.state = { hasError:false, err:null }; }
  static getDerivedStateFromError(err){ return { hasError:true, err }; }
  render(){
    if (this.state.hasError) {
      return <div style={{padding:20,color:"#ff6b6b",fontFamily:"monospace",fontSize:13,lineHeight:1.7,whiteSpace:"pre-wrap"}}>
        ⚠️ 렌더링 오류\n\n{String(this.state.err && this.state.err.message || this.state.err)}
      </div>;
    }
    return this.props.children;
  }
}

try {
  document.getElementById("root").dataset.mounted = "1";
  ReactDOM.createRoot(document.getElementById("root")).render(
    <ErrorBoundary><App/></ErrorBoundary>
  );
} catch (e) {
  const el = document.getElementById("root");
  if (el) el.innerHTML = '<div style="padding:20px;color:#ff6b6b;font-family:sans-serif;font-size:14px;line-height:1.6">'
    + '⚠️ 앱 로딩 중 오류가 발생했습니다.<br/><br/>'
    + '<small style="color:#888">' + (e && e.message ? e.message : e) + '</small></div>';
}
</script>

    navigator.serviceWorker.register("./sw.js").catch(function () {});
  });
